[terminal]
default_shell = "fish"

[update]
channel = "stable"
version_check = true
manifest_check = true

[keys]
prefix = "ctrl+b"
goto = "prefix+g"
new_tab = "prefix+t"
next_tab = "prefix+n"
previous_tab = "prefix+p"
focus_pane_left = "prefix+h"
navigate_workspace_down = "j"
navigate_pane_down = "ctrl+j"
split_horizontal = "prefix+minus"
detach = "prefix+q"
workspace_picker = "prefix+w"
