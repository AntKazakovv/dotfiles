<ng-container [ngSwitch]="$params.theme">
    <ng-container *ngSwitchCase="'wolf'" [ngTemplateOutlet]="wolf"></ng-container>
    <ng-container *ngSwitchDefault [ngTemplateOutlet]="def"></ng-container>
</ng-container>

<ng-template #wolf>
    <div *ngIf="isShowLangByThemeWolf"
        class="{{$class}}__current"
        [attr.data-wlc-element]="'selected_link_' + currentLanguage.code"
        (click)="toggle()"
        [tooltip]="$params.useTooltip && currentLanguage.label"
        placement="right"
        [ngClass]="[((isOpened || isModalOpen) && !$params.dropdown?.expandableOnHover)
            ? $class + '__current--opened': '']"
        [class.single-lang]="hasSingleLang"
        [class.modal]="!isShowLangByDropdown"
        #langContainer>

        <ng-container *ngIf="$params.currentLang?.hideFlag; else flag">
            <div *ngIf="$params.defaultIcon"
                wlc-icon
                class="{{$class}}__icon"
                [iconPath]="$params.defaultIcon">
            </div>
        </ng-container>

        <div *ngIf="!$params.currentLang?.hideArrow" class="{{$class}}__current-lang">
            {{currentLanguage?.label | translate}}
        </div>

        <div *ngIf="!$params.currentLang?.hideArrow && availableLanguages.length !== 1"
            wlc-icon
            class="{{$class}}__current-arrow"
            iconPath="/wlc/icons/icons_new/arrow.svg">
        </div>
    </div>

    <div *ngIf="isShowLangByDropdown && !$params.dropdown?.expandableOnHover"
        class="{{$class}}__dropdown"
        [@toggle]="isOpened ? 'opened' : 'closed'"
        #dropdown>
        <ng-container
            [ngTemplateOutlet]="langList"
            [ngTemplateOutletContext]="{list: availableLanguages, class: $class}"
        ></ng-container>
    </div>

    <div *ngIf="isShowLangByDropdown && $params.dropdown?.expandableOnHover"
        class="{{$class}}__dropdown--hover"
        #dropdown>
        <ng-container
            [ngTemplateOutlet]="langList"
            [ngTemplateOutletContext]="{list: availableLanguages, class: $class}">
        </ng-container>
    </div>

    <ng-template #langList let-list="list" let-$class="class">
        <div class="{{$class}}__list">
            <div *ngFor="let lang of list"
                class="{{$class}}__item {{$class}}__item--{{lang.code}}"
                [ngClass]="[lang.code === currentLanguage.code ? $class + '__item--active': '']">

                <a href="/{{lang.code}}"
                    class="{{$class}}__link"
                    [attr.data-wlc-element]="'link_' + lang.code"
                    (click)="changeLanguage(lang.code, $event)">

                    <div *ngIf="!$params.dropdown?.hideFlag" class="{{$class}}__link-flag">
                        <img src="{{getFlagUrl(lang.code)}}"
                            loading="lazy"
                            alt="{{lang.label}}"
                            (error)="imageError(lang.code)">
                    </div>

                    <span *ngIf="!$params.dropdown?.hideLang" class="{{$class}}__link-lang">
                        {{lang.label}}
                    </span>
                </a>
            </div>
        </div>
    </ng-template>
</ng-template>

<ng-template #def>
    <div class="{{$class}}__current"
        [attr.data-wlc-element]="'selected_link_' + currentLanguage.code"
        (click)="toggle()"
        [ngClass]="[(isOpened || isModalOpen) ? $class + '__current--opened': '']"
        [class.single-lang]="hasSingleLang"
        [tooltip]="$params.useTooltip && currentLanguage.label"
        container="body"
        containerClass="wlc-tooltip--compact"
        boundariesElement="viewport"
        placement="right"
        #langContainer>

        <div *ngIf="!$params.currentLang?.hideFlag" class="{{$class}}__current-flag">
            <img src="{{getFlagUrl(currentLanguage.code)}}"
                loading="lazy"
                alt="{{currentLanguage.label}}"
                (error)="imageError(currentLanguage.code)">
        </div>
        <div *ngIf="!$params.currentLang?.hideLang" class="{{$class}}__current-lang">
            {{!isLongThemeMod ? this.currentLanguage?.code : this.currentLanguage?.label | translate}}
        </div>
        <div *ngIf="!$params.currentLang?.hideArrow"
             wlc-icon
             class="{{$class}}__current-arrow"
             iconPath="/wlc/icons/icons_new/arrow.svg">
        </div>
    </div>
    <div *ngIf="isShowLangByDropdown"
        class="{{$class}}__dropdown"
        [@toggle]="animationState()"
        #dropdown>

        <ng-container [ngTemplateOutlet]="langList"
            [ngTemplateOutletContext]="{list: availableLanguages, class: $class}">
        </ng-container>
    </div>

    <ng-template #langList let-list="list" let-$class="class">
        <div class="{{$class}}__list">
            <div *ngFor="let lang of list"
                class="{{$class}}__item {{$class}}__item--{{lang.code}}"
                [ngClass]="[lang.code === currentLanguage.code ? $class + '__item--active': '']"
                [tooltip]="$params.useTooltip && lang.label"
                container="body"
                containerClass="wlc-tooltip--compact"
                boundariesElement="viewport"
                placement="right">

                <a href="/{{lang.code}}"
                    class="{{$class}}__link"
                    [attr.data-wlc-element]="'link_' + lang.code"
                    (click)="changeLanguage(lang.code, $event)">

                    <span *ngIf="!$params.dropdown?.hideFlag" class="{{$class}}__link-flag">
                        <img src="{{getFlagUrl(lang.code)}}"
                            loading="lazy"
                            alt="{{lang.label}}"
                            (error)="imageError(lang.code)">
                    </span>

                    <span *ngIf="!$params.dropdown?.hideLang" class="{{$class}}__link-lang">
                        {{lang.label}}
                    </span>
                </a>
            </div>
        </div>
    </ng-template>
</ng-template>

<ng-template #flag>
    <div *ngIf="!$params.currentLang?.hideFlag" class="{{$class}}__current-flag">
        <img src="{{getFlagUrl(currentLanguage.code)}}"
            loading="lazy"
            alt="{{currentLanguage.label}}"
            (error)="imageError(currentLanguage.code)">
    </div>
</ng-template>
