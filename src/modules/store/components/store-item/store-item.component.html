<ng-template #default>
    <div class="{{$class}}__image-block">
        <div class="{{$class}}__tag"
            [ngClass]="tagClass"
            data-wlc-element="store_item-title">{{storeItemTag | translate}}
        </div>
        <div *ngIf="storeImage"
            class="{{$class}}__image"
            data-wlc-element="store_item-image">
            <img [src]="storeImage" loading="lazy">
        </div>
        <div *ngIf="useIconBonusImage" class="{{$class}}__bonus-icon">
            <img class="icon-sign"
                loading="lazy"
                [src]="storeItem.bonus.icon"
                [wlc-fallback]="storeItem.bonus.fallBackIconPath"
                (imageError)="imageErrorLoad()">
            <ng-container *ngIf="storeItem.bonus.currencyIcon then valueBalance else valueFreerounds"></ng-container>
        </div>
    </div>
</ng-template>
<ng-template #first>
    <div class="{{$class}}__image-block">
        <div class="{{$class}}__tag"
            [ngClass]="tagClass"
            data-wlc-element="store_item-title">{{storeItemTag | translate}}
        </div>
        <div class="{{$class}}__image"
            data-wlc-element="store_item-image"
            [style]="{backgroundImage: 'url(' + storeImage + ')'}">
        </div>
    </div>
</ng-template>

<ng-template #valueBalance>
    <div *ngIf="storeItem.bonus.value && storeItem.bonus.bonusType != 'lootbox'"
         wlc-currency
         class="icon-text"
         digitsInfo="1-0-0"
         minLength="4"
         maxLength="6"
         [wlc-value-length]="valueStore"
         [value]="valueStore">
    </div>
</ng-template>

<ng-template #valueFreerounds>
    <div *ngIf="storeItem.bonus.value && storeItem.bonus.bonusType != 'lootbox'"
         class="icon-text"
         minLength="4"
         maxLength="6"
         [wlc-value-length]="storeItem.bonus.value">
        {{storeItem.bonus.value}}
    </div>
</ng-template>

<div class="{{$class}}__content"
    [class.noauth]="!isAuth"
    [class.unavailable]="isDisabled">
    <div class="{{$class}}__wrapper">
        <ng-container [ngSwitch]="$params?.theme">
            <ng-container *ngSwitchCase="'first'" [ngTemplateOutlet]="first"></ng-container>
            <ng-container *ngSwitchDefault [ngTemplateOutlet]="default"></ng-container>
        </ng-container>
        <div class="{{$class}}__bottom">
            <div class="{{$class}}__info-block">
                <div class="{{$class}}__name"
                    data-wlc-element="store_item-name">
                    {{storeItem.name}}
                </div>
                <div class="{{$class}}__price" data-wlc-element="store_item-price">
                    <div
                        *ngIf="!!storeItem.priceLoyalty"
                        wlc-currency
                        class="price-item"
                        currency="LP"
                        digitsInfo="1-0-0"
                        [value]="storeItem.priceLoyalty">
                    </div>
                    <div
                        *ngIf="!!storeItem.priceExp"
                        wlc-currency
                        class="price-item"
                        currency="EP"
                        digitsInfo="1-0-0"
                        [value]="storeItem.priceExp">
                    </div>
                </div>
            </div>
        </div>
        <div *ngIf="isAuth" class="{{$class}}__btns">
            <div *ngIf="isDisabled; else buyBtn"
                class="{{$class}}__lock-btn">
                <span wlc-icon
                    class="lock-btn__icon"
                    [iconPath]="'/wlc/icons/lock-icon.svg'"></span>
                <span class="lock-btn__text">{{disabledInfo.btnText| translate}}</span>
            </div>
        </div>
    </div>
    <div class="{{$class}}__more-icon">
        <div wlc-icon
            class="icon-btn"
            iconPath="/wlc/icons/info.svg"
            [wlcElement]="'button_terms'"
            (click)="openDescription(storeItem)">
        </div>
    </div>
</div>

<ng-template #buyBtn>
    <button *ngIf="storeItem.canBuy"
        wlc-button
        [disabled]="buyClick"
        [inlineParams]="$params.btnsParams.buyBtnParams"
        (click)="buyItem()">
    </button>
</ng-template>
