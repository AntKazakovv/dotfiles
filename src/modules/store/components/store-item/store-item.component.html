<ng-container [ngSwitch]="$params?.theme">
    <ng-container *ngSwitchCase="'wolf'" [ngTemplateOutlet]="wolf"></ng-container>
    <ng-container *ngSwitchDefault [ngTemplateOutlet]="default"></ng-container>
</ng-container>

<ng-template #defaultImageBlock>
    <div class="{{$class}}__image-block">
        <div class="{{$class}}__tag"
            [ngClass]="tagClass"
            data-wlc-element="store_item-title">{{storeItemTag | translate}}
        </div>
        <div *ngIf="storeImage"
            class="{{$class}}__image"
            data-wlc-element="store_item-image">
            <img [src]="storeImage" loading="lazy">
        </div>
        <div *ngIf="useIconBonusImage" class="{{$class}}__bonus-icon">
            <img class="icon-sign"
                loading="lazy"
                [src]="storeItem.bonus.icon"
                [wlc-fallback]="storeItem.bonus.fallBackIconPath"
                (imageError)="imageErrorLoad()">
            <ng-container *ngIf="storeItem.bonus.currencyIcon then bonusCurrencyValue else bonusValue"></ng-container>
        </div>
    </div>
</ng-template>
<ng-template #firstImageBlock>
    <div class="{{$class}}__image-block">
        <div class="{{$class}}__tag"
            [ngClass]="tagClass"
            data-wlc-element="store_item-title">{{storeItemTag | translate}}
        </div>
        <div class="{{$class}}__image"
            data-wlc-element="store_item-image"
            [style]="{backgroundImage: 'url(' + storeImage + ')'}">
        </div>
    </div>
</ng-template>

<ng-template #bonusCurrencyValue>
    <div *ngIf="storeItem.bonus.value && storeItem.bonus.bonusType != 'lootbox'"
        wlc-currency
        class="icon-text"
        digitsInfo="1-0-0"
        minLength="4"
        maxLength="6"
        [wlc-value-length]="valueStore"
        [value]="valueStore">
    </div>
</ng-template>

<ng-template #bonusValue>
    <div *ngIf="storeItem.bonus.value && storeItem.bonus.bonusType != 'lootbox'"
        class="icon-text"
        minLength="4"
        maxLength="6"
        [wlc-value-length]="storeItem.bonus.value">
        {{storeItem.bonus.value}}
        <span *ngIf="isBonusRelative" class="{{$class}}__icon-percent">%</span>
    </div>
</ng-template>

<ng-template #default>
    <div class="{{$class}}__content"
        [class.noauth]="!isAuth"
        [class.unavailable]="isDisabled">
        <div class="{{$class}}__wrapper">
            <ng-container [ngSwitch]="$params?.theme">
                <ng-container *ngSwitchCase="'first'" [ngTemplateOutlet]="firstImageBlock"></ng-container>
                <ng-container *ngSwitchDefault [ngTemplateOutlet]="defaultImageBlock"></ng-container>
            </ng-container>
            <div class="{{$class}}__bottom">
                <div class="{{$class}}__info-block">
                    <div class="{{$class}}__name"
                        data-wlc-element="store_item-name">
                        {{storeItem.name}}
                    </div>
                    <div class="{{$class}}__price" data-wlc-element="store_item-price">
                        <div wlc-store-item-price [storeItemTotalPrice]="storeItemTotalPrice"></div>
                    </div>
                </div>
            </div>
            <div *ngIf="isAuth" class="{{$class}}__btns">
                <div *ngIf="isDisabled || !storeItem.canBuy; else buyBtn"
                    class="{{$class}}__lock-btn">
                    <span wlc-icon
                        class="lock-btn__icon"
                        [iconPath]="'/wlc/icons/lock-icon.svg'"></span>
                    <span class="lock-btn__text">{{itemDisabledInfo?.btnText | translate}}</span>
                </div>
            </div>
        </div>
        <div class="{{$class}}__more-icon">
            <div wlc-icon
                class="icon-btn"
                iconPath="/wlc/icons/info.svg"
                [wlcElement]="'button_terms'"
                (click)="openDescription()">
            </div>
        </div>
    </div>
</ng-template>

<ng-template #wolf>
    <div class="{{$class}}__content"
        [class.noauth]="!isAuth"
        [class.unavailable]="isDisabled">
        <div class="{{$class}}__wrapper"
            [class.unavailable]="isDisabled"
            (click)="storeItemClickHadler($event)">
            <div class="{{$class}}__more-icon">
                <div wlc-icon
                    class="icon-btn"
                    iconPath="/wlc/icons/theme-wolf/interface/info.svg"
                    [wlcElement]="'button_terms'">
                </div>
            </div>
            <span wlc-tag
                class="{{$class}}__tag"
                [inline]="tagConfig">
            </span>
            <div class="{{$class}}__name"
                data-wlc-element="store_item-name">
                {{storeItem.name}}
            </div>
            <div *ngIf="storeImage"
                class="{{$class}}__image"
                data-wlc-element="store_item-image">
                <img [src]="storeImage" loading="lazy">
            </div>
            <div *ngIf="useIconBonusImage" class="{{$class}}__image">
                <div class="{{$class}}__bonus-icon">
                    <img class="icon-sign"
                        loading="lazy"
                        [src]="storeItem.bonus.icon"
                        [wlc-fallback]="storeItem.bonus.fallBackIconPath"
                        (imageError)="imageErrorLoad()">
                    <ng-container *ngIf="storeItem.bonus.currencyIcon then bonusCurrencyValue else bonusValue"></ng-container>
                </div>
            </div>
            <div class="{{$class}}__price" data-wlc-element="store_item-price">
                <div wlc-store-item-price [storeItemTotalPrice]="storeItemTotalPrice"></div>
            </div>
            <div *ngIf="isAuth" class="{{$class}}__btns">
                <div *ngIf="isDisabled; else buyBtn" class="{{$class}}__lock-btn">
                    <span wlc-icon
                        class="lock-btn__icon"
                        iconUrl="/wlc/icons/theme-wolf/interface/locked.svg">
                    </span>
                    <div class="lock-btn__text">{{itemDisabledInfo?.btnText | translate}}</div>
                </div>
            </div>
        </div>
    </div>
</ng-template>

<ng-template #buyBtn>
    <button wlc-button
        class="{{$class}}__buy-btn"
        [inlineParams]="buyBtnParams"
        (click)="showConfirmationModal()">
    </button>
</ng-template>
