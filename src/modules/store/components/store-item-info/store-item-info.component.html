<div class="{{$class}}__title">
    {{$params.title | translate}}
</div>
<div class="{{$class}}__body">
    <div *ngIf="$params.isDisabled"
        wlc-alert
        class="{{$class}}__alert-block"
        [title]="'This product will become available for purchase when you have no active bonuses left.' | translate">
    </div>
    <div class="{{$class}}__description">
        <div wlc-dynamic-html
             [scope]="scope"
             [withoutCompilation]="false"
             [html]="$params.description">
        </div>
    </div>
</div>
