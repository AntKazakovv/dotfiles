<div class="{{$class}}__content" data-wlc-element="wlc-store">
    <div *ngIf="showDesktopFilter; else mobileFilter"
        class="{{$class}}__filter">
        <div wlc-select [inlineParams]="storeFilter"></div>
    </div>
    <div wlc-wrapper
        class="{{$class}}__user-stats"
        [inlineParams]="userStatsConfig">
    </div>
    <div *ngIf="isMultiWallet"
         wlc-alert
         class="{{$class}}__alert-block"
         [level]="'warning'"
         [title]="'Please note that some transactions are processed only through your main wallet.' | translate">
    </div>
    <div *ngIf="paginatedStoreItems?.length && isReady; else: noItems"
         class="{{$class}}__list"
         [class.first]="isProfileFirst">
        <div *ngFor="let item of paginatedStoreItems"
            wlc-store-item
            [storeItem]="item"
            [theme]="itemTheme"
            [userLevel]="userLevel"
            [userCurrency]="userCurrency"
            [itemDisabledInfo]="getItemDisabledInfo(item)">
        </div>
    </div>
    <div wlc-pagination
         [items]="storeItems"
         [settings]="$params.common?.pagination"
         (paginationOnChange)="paginationOnChange($event)">
    </div>
    <ng-template #noItems>
        <div *ngIf="isReady; else loading"
            wlc-wrapper
            class="{{$class}}__nocontent"
            [inlineParams]="emptyConfig">
        </div>
    </ng-template>
</div>

<ng-template #loading>
    <div class="{{$class}}__loader">
        <div wlc-loader></div>
    </div>
</ng-template>

<ng-template #mobileFilter>
    <button wlc-button
        class="{{$class}}__filter-button"
        theme="custom"
        [iconPath]="filterIconPath"
        (click)="openFilter()">
    </button>
</ng-template>
