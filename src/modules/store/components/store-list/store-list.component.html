<div class="{{$class}}__content" data-wlc-element="wlc-store">
    <div *ngIf="paginatedStoreItems?.length && isReady; else: noItems"
         class="{{$class}}__list"
         [class.first]="isProfileFirst">
        <div *ngFor="let item of paginatedStoreItems"
             wlc-store-item
             [storeItem]="item"
             [theme]="itemTheme"></div>
    </div>
    <div wlc-pagination
         [items]="storeItems"
         [settings]="$params.common?.pagination"
         (paginationOnChange)="paginationOnChange($event)">
    </div>
    <ng-template #noItems>
        <div *ngIf="isReady; else loading" wlc-wrapper [inlineParams]="$params.emptyConfig"></div>
    </ng-template>
</div>

<ng-template #loading>
    <div class="{{$class}}__nocontent">
        <div wlc-loader></div>
    </div>
</ng-template>
