<form class="{{$class}}__form"
    [formGroup]="form"
    (ngSubmit)="submitHandler()">
    <div wlc-emoji
        [isOpened]="emojiPanelState$"
        (chooseEmojiEvent)="addEmoji($event)">
    </div>
    <fieldset class="{{$class}}__fieldset">
        <div class="{{$class}}__nickname">
            <ng-container *ngIf="nickname; else connecting">{{nickname}}</ng-container>
        </div>

        <ng-template #connecting>{{'connecting...' | translate}}</ng-template>

        <div class="{{$class}}__textarea-wrapper">
            <div #textareaFake class="{{$class}}__textarea {{$class}}__textarea--fake">{{message.value}}</div>
            <textarea class="{{$class}}__textarea"
                #message
                name="message"
                rows="1"
                placeholder="{{'Type your message' | translate}}"
                formControlName="message"
                (blur)="saveCursorPosition($event)">
            </textarea>
        </div>

        <div class="{{$class}}__buttons">
            <div class="{{$class}}__buttons-container {{$class}}__buttons-container--left">
                <button wlc-btn
                    class="{{$class}}__control"
                    theme="icon"
                    type="button"
                    title="Add emoji"
                    [disabled]="form.disabled"
                    (click)="toggleEmojiPanel()">

                    <svg icon viewBox="0 0 26 26" fill="currentColor" xmlns="http://www.w3.org/2000/svg"><path fill-rule="evenodd" clip-rule="evenodd" d="M13.35 23.38a10.5 10.5 0 1 0 0-21 10.5 10.5 0 0 0 0 21Zm0 2a12.5 12.5 0 1 0 0-25 12.5 12.5 0 0 0 0 25Z"/><path d="M10.03 16.51c.16.25.37.5.63.7.68.58 1.65.92 2.69.92s2-.34 2.7-.91c.25-.22.46-.46.62-.7a1 1 0 0 1 1.69 1.07c-.28.43-.63.83-1.04 1.17a6.24 6.24 0 0 1-3.97 1.37 6.61 6.61 0 0 1-4.06-1.45 5.06 5.06 0 0 1-.99-1.16 1 1 0 0 1 .3-1.28.97.97 0 0 1 1.43.27ZM10.45 10.03a1.6 1.6 0 1 1-3.2 0 1.6 1.6 0 0 1 3.2 0ZM19.45 10.03a1.6 1.6 0 1 1-3.2 0 1.6 1.6 0 0 1 3.2 0Z"/></svg>
                </button>
                <!-- TODO: move to button component
                    <button wlc-btn theme="icon">
                        <svg icon viewBox="0 0 25 25" fill="currentColor" xmlns="http://www.w3.org/2000/svg"><path d="M9.68 23.34a4.66 4.66 0 0 1-6.6-6.6L14.97 4.88a2.8 2.8 0 1 1 3.96 3.96l-9.24 9.24a.93.93 0 1 1-1.32-1.32L17.6 7.5a.93.93 0 1 0-1.32-1.32L4.41 18.07a2.8 2.8 0 0 0 3.95 3.95l11.88-11.87a4.66 4.66 0 0 0-6.6-6.6L4.41 12.8a.93.93 0 1 1-1.32-1.32l9.23-9.24a6.53 6.53 0 1 1 9.24 9.24L9.68 23.34Z"/></svg>
                    </button>
                -->
                <!-- <label class="{{$class}}__label" style="white-space: nowrap;">
                    <input type="checkbox" name="isFake" id="isFake" formControlName="isFake">
                    <span>{{' '}} is fake</span>
                </label> -->
            </div>
            <div class="{{$class}}__buttons-container {{$class}}__buttons-container--right">
                <span #counter
                    class="{{$class}}__counter"
                    [ngClass]="{'overflow': form.controls.message.invalid}">
                    {{message.value.length}}/160
                </span>
                <button
                    wlc-btn
                    mod="primary"
                    [disabled]="form.disabled || form.controls.message.invalid"
                    type="submit">
                    {{'Send' | translate}}
                </button>
            </div>
        </div>
    </fieldset>
</form>
