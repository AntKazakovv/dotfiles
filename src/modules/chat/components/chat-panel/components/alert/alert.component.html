<ng-container>
    <div class="{{$class}}__content">
        <div class="{{$class}}__title">
            <ng-content select="[title]"></ng-content>
        </div>
        <div class="{{$class}}__text">
            <ng-content></ng-content>
        </div>
        <div class="{{$class}}__controls">
            <ng-content select="[controls]"></ng-content>
        </div>
    </div>
    <div *ngIf="theme === 'panel'" class="{{$class}}__icon" [ngSwitch]="mod">
        <ng-container [ngTemplateOutlet]="iconError" *ngSwitchCase="'error'"></ng-container>
        <ng-container [ngTemplateOutlet]="iconSuccess" *ngSwitchCase="'success'"></ng-container>
        <ng-container [ngTemplateOutlet]="iconWarning" *ngSwitchDefault></ng-container>
    </div>
</ng-container>

<ng-template #iconWarning>

</ng-template>

        <path fill-rule="evenodd" clip-rule="evenodd" d="M15 7.53882C15 11.6844 11.6451 15.0388 7.5 15.0388C3.35438 15.0388 0 11.6839 0 7.53882C0 3.3932 3.35495 0.0388184 7.5 0.0388184C11.6456 0.0388184 15 3.39377 15 7.53882ZM10.7089 10.7477C11.0018 10.4548 11.0018 9.97998 10.7089 9.68708L8.56115 7.5393L10.7089 5.39152C11.0018 5.09863 11.0018 4.62376 10.7089 4.33086C10.416 4.03797 9.94116 4.03797 9.64826 4.33086L7.50048 6.47864L5.35162 4.32978C5.05873 4.03688 4.58385 4.03688 4.29096 4.32978C3.99807 4.62267 3.99807 5.09754 4.29096 5.39044L6.43982 7.5393L4.29096 9.68817C3.99807 9.98106 3.99807 10.4559 4.29096 10.7488C4.58385 11.0417 5.05873 11.0417 5.35162 10.7488L7.50048 8.59996L9.64826 10.7477C9.94116 11.0406 10.416 11.0406 10.7089 10.7477Z"/>
