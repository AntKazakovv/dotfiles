<ng-template #default>
    <button type="button"
            class="{{$class}}__button"
            (click)="clickHandler()">
        <svg class="ch-icon-chat" width="100%" height="100%" viewBox="0 0 24 24" fill="currentColor"
             xmlns="http://www.w3.org/2000/svg">
            <path
                d="M2.792 22a.664.664 0 0 1-.301-.064.791.791 0 0 1-.491-.728V6.785A3.871 3.871 0 0 1 5.958 3h12.666a3.871 3.871 0 0 1 3.958 3.784v7.473a3.872 3.872 0 0 1-3.958 3.784H7.074l-3.72 3.728a.791.791 0 0 1-.562.23ZM5.958 4.584a2.296 2.296 0 0 0-2.375 2.2V19.3l2.605-2.612a.793.793 0 0 1 .562-.23h11.874a2.296 2.296 0 0 0 2.375-2.2V6.785a2.296 2.296 0 0 0-2.375-2.2H5.958Z"/>
        </svg>

        <span *ngIf="unread" class="{{$class}}__counter">{{unread$ | async | maxUnread}}</span>
    </button>
</ng-template>
<ng-template #wolf>
    <span class="{{$class}}__item wlc-icon"
          (click)="clickHandler()">
        <svg xmlns="http://www.w3.org/2000/svg" width="17" height="17" fill="none" viewBox="0 0 17 17"><path fill="currentColor" fill-rule="evenodd" d="M8.5.528a8 8 0 1 0 0 16h4c1.242 0 1.864 0 2.354-.203a2.667 2.667 0 0 0 1.443-1.443c.203-.49.203-1.112.203-2.354v-4a8 8 0 0 0-8-8Zm-3.556 7.11c0-.49.398-.888.89-.888h5.333a.889.889 0 0 1 0 1.778H5.833a.889.889 0 0 1-.889-.89Zm2.667 3.556c0-.49.398-.889.889-.889h2.667a.889.889 0 1 1 0 1.778H8.5a.889.889 0 0 1-.889-.889Z" clip-rule="evenodd"/></svg>

        <span *ngIf="unread" class="{{$class}}__counter"></span>
    </span>
</ng-template>

<ng-template #wolfHeader>
    <span class="{{$class}}__item wlc-icon"
          (click)="clickHandler()">
        <svg xmlns="http://www.w3.org/2000/svg" width="17" height="17" fill="none" viewBox="0 0 17 17"><path fill="currentColor" fill-rule="evenodd" d="M8.5.528a8 8 0 1 0 0 16h4c1.242 0 1.864 0 2.354-.203a2.667 2.667 0 0 0 1.443-1.443c.203-.49.203-1.112.203-2.354v-4a8 8 0 0 0-8-8Zm-3.556 7.11c0-.49.398-.888.89-.888h5.333a.889.889 0 0 1 0 1.778H5.833a.889.889 0 0 1-.889-.89Zm2.667 3.556c0-.49.398-.889.889-.889h2.667a.889.889 0 1 1 0 1.778H8.5a.889.889 0 0 1-.889-.889Z" clip-rule="evenodd"/></svg>

        <span *ngIf="unread" class="{{$class}}__counter"></span>
    </span>
</ng-template>

<ng-container [ngSwitch]="$params.theme">
    <ng-container *ngSwitchCase="'default'" [ngTemplateOutlet]="default"></ng-container>
    <ng-container *ngSwitchCase="'wolf'" [ngTemplateOutlet]="wolf"></ng-container>
    <ng-container *ngSwitchCase="'wolf-header'" [ngTemplateOutlet]="wolfHeader"></ng-container>
</ng-container>
