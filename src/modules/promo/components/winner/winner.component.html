<ng-template #default>
    <div class="{{$class}}__wrapper">
        <div class="{{$class}}__block {{$class}}__block--left">
            <div class="{{$class}}__picture">
                <img class="{{$class}}__image"
                     loading="lazy"
                     [attr.src]="[gameImage]"
                     [attr.alt]="[gameName]"
                     [attr.data-wlc-element]="'img_item-' + $params.winnerType + '-wins'">
            </div>
        </div>

        <div class="{{$class}}__block {{$class}}__block--right">
            <div class="{{$class}}__user">
                <img *ngIf="countryIso2 && !$params.hideCountry"
                     class="{{$class}}__country"
                     loading="lazy"
                     [attr.src]="[countryUrl]"
                     [attr.alt]="[countryIso3]">
                <div class="{{$class}}__name" [attr.data-wlc-element]="'name_user_item-' + $params.winnerType + '-wins'">{{name}}</div>
            </div>

            <div class="{{$class}}__amount" [attr.data-wlc-element]="'amount_item-' + $params.winnerType + '-wins'">
                <span wlc-currency
                      [value]="amount"
                      [currency]="currency"
                      [digitsInfo]="0-0-0"></span>
            </div>

            <button class="{{$class}}__game"
                    type="button"
                    [attr.title]="[gameName]"
                    (click)="startGame($event)">
                <span class="{{$class}}__game-name" [attr.data-wlc-element]="'name_game_item-' + $params.winnerType + '-wins'">{{gameName}}</span>
                <span *ngIf="!$params.hideGameIcon"
                      wlc-icon
                      class="{{$class}}__game-arrow"
                      [wlcElement]="'button_game_play_item-'+ $params.winnerType + '-wins'"
                      [iconName]="'winner-arrow'">
                </span>
            </button>
        </div>
    </div>
</ng-template>

<ng-template #one>
    <div class="{{$class}}__wrapper"
        (click)="startGame($event)"
        [attr.title]="[gameName]">
        <div class="{{$class}}__block {{$class}}__block--left">
            <img class="{{$class}}__image"
                 loading="lazy"
                 [attr.src]="[gameImage]"
                 [attr.alt]="[gameName]"
                 [attr.data-wlc-element]="'img_item-' + $params.winnerType + '-wins'">
        </div>

        <div class="{{$class}}__block {{$class}}__block--right">
            <div class="{{$class}}__user">
                <img *ngIf="countryIso2 && !$params.hideCountry"
                     loading="lazy"
                     class="{{$class}}__country"
                     [attr.src]="[countryUrl]"
                     [attr.alt]="[countryIso3]">
                <div class="{{$class}}__name" [attr.data-wlc-element]="'name_user_item-' + $params.winnerType + '-wins'">{{name}}</div>
            </div>

            <div class="{{$class}}__game">{{gameName}}</div>

            <div class="{{$class}}__amount" [attr.data-wlc-element]="'amount_item-' + $params.winnerType + '-wins'">
                <span wlc-currency
                      [value]="amount"
                      [currency]="currency"
                      [digitsInfo]="0-0-0"></span>
            </div>
        </div>
    </div>
</ng-template>

<ng-container [ngSwitch]="$params.theme">
    <ng-container [ngTemplateOutlet]="one" *ngSwitchCase="'1'"></ng-container>
    <ng-container [ngTemplateOutlet]="default" *ngSwitchDefault></ng-container>
</ng-container>
