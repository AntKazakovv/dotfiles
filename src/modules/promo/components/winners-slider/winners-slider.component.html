<div class="{{$class}}__wrapper" [attr.data-wlc-element]="'block-' + $params.type + '-wins'">
    <div class="{{$class}}__container" [ngClass]="{'container': $params.container}">
        <h4 class="{{$class}}__title" [attr.data-wlc-element]="'title_' + $params.type + '-wins'" *ngIf="$params.title" >{{$params.title | translate}}</h4>
        <ng-container *ngIf="ready; else loader">
            <div class="{{$class}}__slider" *ngIf="slides.length; else noslides"
                wlc-slider
                [slides]="slides"
                [inlineParams]="sliderParams">
            </div>
        </ng-container>
    </div>
</div>

<ng-template #loader>
    <div class="{{$class}}__loader" wlc-loader></div>
</ng-template>

<ng-template #noslides>
    <div>No data</div>
</ng-template>
