<div class="{{$class}}__wrapper" *ngIf="slides.length">
    <ng-container *ngIf="ready && slides.length">
        <div class="{{$class}}__slider"
            wlc-slider
            [slides]="slides"
            [inlineParams]="$params.sliderParams">
        </div>
    </ng-container>
</div>

<div *ngIf="useNavigation" slot-container-end>
    <div wlc-slider-navigation
        class="container swiper-button-container"
        [class.desktop]="$params.showNavigationOn === 'desktop'"
        [class.mobile]="$params.showNavigationOn === 'mobile'">
    </div>
</div>
