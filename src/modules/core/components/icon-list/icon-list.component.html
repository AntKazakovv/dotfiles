<div class="{{$class}}__wrapper" #wrapper>
    <div *ngFor="let item of items"
            class="{{$class}}__item {{item.modifier}}"
            [attr.data-wlc-element]="item.wlcElement"
            wlc-icon-list-item
            [inlineParams]='{icon: item, class: $class + "-item"}'>
    </div>
</div>
