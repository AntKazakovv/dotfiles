<ng-container *ngIf="$params.modal; else tooltip">
    <div class="{{$class}}__icon" wlc-icon iconName="info" (click)="openModal($event)"></div>
</ng-container>

<ng-template #tooltip>
    <div class="{{$class}}__icon"
        wlc-icon
        iconName="info"
        containerClass="{{$class}}__bs-tooltip"
        placement="bottom"
        container="body"
        [tooltip]="$params.inlineText | translate">
    </div>
</ng-template>
