<ng-container *ngIf="$params.modal; else tooltip">
    <div class="{{$class}}__icon" wlc-icon iconName="info" (click)="openModal($event)"></div>
</ng-container>

<ng-template #tooltip>
    <div (click)="stopPropagation($event)" class="{{$class}}__icon" wlc-icon iconName="info">
    </div>
    <div class="{{$class}}__content" *ngIf="isShow" [@showTooltip]>
        {{$params.inlineText | translate}}
    </div>
</ng-template>
