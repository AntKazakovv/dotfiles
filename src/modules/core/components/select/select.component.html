<label for="{{$params.name}}"
       *ngIf="$params.labelText"
       class="{{$class}}__label"
       [class.tooltipped]="$params.common?.tooltipText">
    {{$params.labelText | translate}}
    <ng-container *ngIf="isFieldRequired()">*</ng-container>
    <div *ngIf="$params.common?.tooltipText || $params.common?.tooltipModal"
         wlc-tooltip
         [inlineParams]="tooltipParams">
    </div>
</label>

<div wlc-click-outside
     [isOpened]="isOpened"
     class="{{$class}}__group"
     [ngClass] = "{'field-disabled': control.disabled}"
     (clickOutside)="closeDropdown(); clickedOutside = true">
    <button ngDefaultControl
            id="{{$params.name}}"
            [attr.data-wlc-element]="fieldWlcElement"
            class="{{$class}}__field"
            name="{{$params.name}}"
            [attr.type]="'button'"
            [formControl]="control"
            (click)="toggleDropdown()">
        {{buttonText | translate}}
    </button>
    <div *ngIf="control.touched && !control.valid && $params.name"
         wlc-form-control
         class="{{$class}}-status"
         [className]="$class"
         [control]="control"
         [validators]="$params.validators"
         [fieldName]="$params.name.toLowerCase()">
    </div>
    <div class="{{$class}}-status">
        <span *ngIf="control.untouched || control.valid"
              wlc-icon
              class="{{$class}}-status__arrow"
              [ngClass]="{'active': isOpened}"
              iconPath="/wlc/icons/arrow.svg"
              (click)="toggleDropdown()">
        </span>
    </div>

    <ul *ngIf="isOpened"
        #selectList
        class="{{$class}}__dropdown"
        @openClose
        (@openClose.done)="scrollSelectList()">
        <li *ngFor="let item of $params.items; index as i;"
            class="{{$class}}__dropdown-item"
            [ngClass]="{'active': activeItemIndex === i}"
            [attr.data-wlc-element]="fieldWlcElement + '_' + (item.value || 'null')"
            (click)="choseSelectByClick(item, i)">
            {{item.title.toString() | translate}}
        </li>
    </ul>
</div>
