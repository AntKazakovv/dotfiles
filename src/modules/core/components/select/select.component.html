<label *ngIf="$params.labelText"
       class="{{$class}}__label"
       for="{{$params.id || $params.name}}"
       [class.tooltipped]="$params.common?.tooltipText">
    {{$params.labelText | translate}}
    <ng-container *ngIf="isFieldRequired()">*</ng-container>
    <div *ngIf="$params.common?.tooltipText || $params.common?.tooltipModal"
         wlc-tooltip
         [inlineParams]="tooltipParams">
    </div>
</label>

<div wlc-click-outside
     class="{{$class}}__group"
     [isOpened]="isOpened"
     [ngClass] = "{'field-disabled': control.disabled}"
     (clickOutside)="closeDropdown()">
    <ng-container *ngIf="$params.useSearch && !control.disabled; else button">
        <input #searchInput
               id="{{$params.id || $params.name}}"
               class="{{$class}}__field"
               type="text"
               [placeholder]="placeholderText | translate"
               name="{{$params.name}}"
               autocomplete="{{$params.autocomplete}}"
               readonly
               [(ngModel)]="searchText"
               [disabled]="control.disabled"
               [ngClass]="{
                    'ng-invalid': control.invalid,
                    'ng-valid': control.valid,
                    'ng-touched': control.touched,
                    'ng-untouched': control.untouched
               }"
               [attr.data-wlc-element]="fieldWlcElement"
               (click)="openDropdown()"
               (input)="searchItems()">
    </ng-container>
    <div *ngIf="!control.disabled && control.touched && !control.valid && $params.name"
         wlc-form-control
         class="{{$class}}-status"
         [className]="$class"
         [control]="control"
         [validators]="$params.validators"
         [fieldName]="$params.name.toLowerCase()">
    </div>
    <div class="{{$class}}-status">
        <span *ngIf="control.disabled || control.untouched || control.valid"
              wlc-icon
              class="{{$class}}-status__arrow"
              iconPath="/wlc/icons/arrow.svg"
              [ngClass]="{'active': isOpened}"
              (click)="toggleDropdown()">
        </span>
    </div>

    <ul *ngIf="isOpened"
        class="{{$class}}__dropdown"
        #selectList
        @openClose
        (@openClose.done)="scrollSelectList()">
        <ng-container *ngIf="!$params.useIcon; else optionWithIcon">
            <li *ngFor="let item of foundItems; index as $index;"
                class="{{$class}}__dropdown-item"
                [ngClass]="{'active': activeItemIndex === $index}"
                [attr.data-wlc-element]="fieldWlcElement + '_' + (item.value || 'null')"
                [innerHtml]="item.title.toString() | translate | hlSubstr :searchText :$params.insensitiveSearch"
                (click)="choseSelectByClick(item, $index)">
            </li>
        </ng-container>
        <li *ngIf="$params.useSearch && !foundItems.length"
            class="{{$class}}__dropdown-item no-result">
            {{$params.noResultText | translate}}
        </li>
    </ul>
</div>

<ng-template #button>
    <button ngDefaultControl
            id="{{$params.id || $params.name}}"
            class="{{$class}}__field"
            name="{{$params.name}}"
            [attr.data-wlc-element]="fieldWlcElement"
            [attr.type]="'button'"
            [formControl]="control"
            (click)="toggleDropdown()">
        {{placeholderText | translate}}
    </button>
</ng-template>

<ng-template #optionWithIcon>
    <li *ngFor="let item of foundItems; index as $index;"
        class="{{$class}}__dropdown-item"
        [ngClass]="{'active': activeItemIndex === $index}"
        [attr.data-wlc-element]="fieldWlcElement + '_' + (item.value || 'null')"
        (click)="choseSelectByClick(item, $index)">
        <img [src]="item.icon" wlc-fallback />
        <span [innerHtml]="item.title.toString() | translate | hlSubstr :searchText :$params.insensitiveSearch">
        </span>
    </li>
</ng-template>
