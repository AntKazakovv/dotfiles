<label for="{{$params.name}}"
       *ngIf="$params.labelText"
       class="{{$class}}__label"
>{{$params.labelText | translate}}
    <ng-container *ngIf="isFieldRequired()">*</ng-container>
    <div *ngIf="$params.common?.tooltipText || $params.common?.tooltipModal"
         wlc-tooltip
         [inlineParams]="{inlineText: $params.common.tooltipText, modal: $params.common?.tooltipModal, modalParams: $params.common?.tooltipModalParams}">
    </div>
</label>
<div class="{{$class}}__group"
     wlc-click-outside (clickOutside)="closeDropdown()">
    <button class="{{$class}}__field"
            type="button"
            id="{{$params.name}}"
            name="{{$params.name}}"
            [attr.data-wlc-element]='fieldWlcElement'
            (click)="toggleDropdown()"
            [formControl]="control"
            ngDefaultControl
    >{{selectedItem || $params.common.placeholder || $params.items[0]?.title | translate}}
    </button>
    <div class="{{$class}}-status"
         wlc-form-control
         *ngIf="$params.name"
         [className]="$class"
         [control]="control"
         [validators]="$params.validators"
         [fieldName]="$params.name.toLowerCase()"
    ></div>
    <div class="{{$class}}-status">
        <span
            *ngIf="!$params.name || control.untouched"
            class="{{$class}}-status__arrow"
            wlc-icon iconName="arrow"
            (click)="toggleDropdown()"
        ></span>
    </div>

    <ul class="{{$class}}__dropdown" *ngIf="isOpened">
        <li class="{{$class}}__dropdown-item"
            *ngFor="let item of $params.items"
            (click)="selectOption(item)"
        >
            {{item.title | translate}}
        </li>
    </ul>
</div>
