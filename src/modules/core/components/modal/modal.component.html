<div class="fade"
     bsModal
     [config]="bsOptions"
     tabindex="-1"
     role="dialog"
     #modal="bs-modal"
>
    <div class="wlc-modal__dialog modal-dialog"
         [class]="dialogClasses">
        <div class="wlc-modal__header"
             [class.wlc-modal__header--headless]="!$params.config.modalTitle">
            <div class="wlc-modal__title"
                *ngIf="$params.config.modalTitle">
                {{$params.config.modalTitle | translate}}
            </div>
            <button wlc-button
                    class="wlc-modal__close"
                    theme="none"
                    icon="close"
                    (click)="closeModal($params.config.id)"
                    aria-label="Close"
                    title="Close">
            </button>
        </div>

        <div class="wlc-modal__body">
            <ng-container *ngTemplateOutlet="$params.config.component ? component : message"></ng-container>
        </div>

        <div class="wlc-modal__footer" *ngIf='$params.config.showFooter'>
            <button type="button"
                    wlc-button
                    *ngIf="$params.config.showConfirmBtn"
                    [text]="$params.config.confirmBtnText || 'Confirm'"
                    (click)="confirm($params.config.id)">
            </button>
            <button type="button"
                    wlc-button
                    [text]="$params.config.closeBtnText || 'Close'"
                    (click)="closeModal($params.config.id)">
            </button>
        </div>
    </div>
</div>

<ng-template #component>
    <ng-container
        [ngComponentOutlet]="$params.config.component"
        [ngComponentOutletInjector]="inject"
    ></ng-container>
</ng-template>

<ng-template #message>
    <div class="modal-message" *ngFor="let msg of $params.config.modalMessage">
        {{msg | translate}}
    </div>
</ng-template>
