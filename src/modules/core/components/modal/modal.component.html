<div class="wlc-modal__wrapper fade"
     bsModal
     [config]="bsOptions"
     role="dialog"
     #modal="bs-modal"
>
    <div class="wlc-modal__dialog modal-dialog"
         [class]="dialogClasses">
        <div class="wlc-modal__header"
             [class.wlc-modal__header--headless]="!$params.config.modalTitle">
            <div *ngIf="$params.config.useBackButton"
                 class="wlc-modal__back-btn"
                 (click)="goBack('login')"
            >
                <span class="icon-arrow"
                      wlc-icon [iconName]="'arrow'"
                ></span>
                <span class="wlc-modal__back-btn-text">
                    {{$params.config.backButtonText | translate}}
                </span>
            </div>
            <div class="wlc-modal__title"
                 [class.wlc-modal__title--back-btn]="$params.config.useBackButton"
                 *ngIf="$params.config.modalTitle">
                 {{$params.config.modalTitle | translate}}
            </div>
            <button *ngIf="$params.config.closeBtnVisibility"
                    wlc-button
                    class="wlc-modal__close"
                    theme="none"
                    icon="close"
                    wlcElement="button_close"
                    (click)="closeModal($params.config.id)"
                    [attr.aria-label]="'Close' | translate"
                    [title]="'Close' | translate">
            </button>
        </div>
        <div
            class="wlc-modal__body"
            [ngClass]="{'without-padding': $params.config.withoutPadding}"
            [ngSwitch]="getType()">
            <ng-container *ngSwitchCase="'component'"
                          [ngTemplateOutlet]="component">
            </ng-container>
            <ng-container *ngSwitchCase="'templateRef'"
                          [ngTemplateOutlet]="template">
            </ng-container>
            <ng-container *ngSwitchCase="'message'"
                          [ngTemplateOutlet]="message">
            </ng-container>
            <ng-container *ngSwitchCase="'message-and-component'"
                          [ngTemplateOutlet]="messageAndComponent">
            </ng-container>
        </div>

        <div class="wlc-modal__footer" *ngIf='$params.config.showFooter'>
            <button wlc-button
                    typeAttr="button"
                    *ngIf="$params.config.showConfirmBtn"
                    [text]="$params.config.confirmBtnText || 'Confirm'"
                    [inlineParams]="$params.config.confirmBtnParams"
                    (click)="confirm($params.config.id)">
            </button>
            <button wlc-button
                    typeAttr="button"
                    type="rejected"
                    [text]="$params.config.closeBtnText || 'Close'"
                    [inlineParams]="$params.config.closeBtnParams"
                    (click)="closeModal($params.config.id)">
            </button>
        </div>
    </div>
</div>

<ng-template #component>
    <ng-container
        [ngComponentOutlet]="$params.config.component"
        [ngComponentOutletInjector]="inject"
    ></ng-container>
</ng-template>

<ng-template #template>
    <ng-container
        [ngTemplateOutlet]="$params.config.templateRef"
        [ngTemplateOutletContext]="$params.config.templateRefParams"
    ></ng-container>
</ng-template>

<ng-template #message>
    <div class="modal-icon modal-icon--confirm" *ngIf="$params?.config?.modifier === 'confirmation' && !$params?.config?.hideIcon" wlc-icon iconName="status/confirm"></div>
    <div
        *ngFor="let msg of $params.config.modalMessage"
        [style]="{'text-align': $params.config.textAlign}"
        class="modal-message">
        {{msg | translate}}
    </div>
</ng-template>
<ng-template #messageAndComponent>
    <div
        *ngFor="let msg of $params.config.modalMessage"
        [style]="{'text-align': $params.config.textAlign}"
        class="modal-message">
        {{msg | translate}}
    </div>
    <ng-container
        [ngComponentOutlet]="$params.config.component"
        [ngComponentOutletInjector]="inject"
    ></ng-container>
</ng-template>
