<div class="{{$class}}__main" [class.with-text]="!!text">
    <div class="{{$class}}__title">
        <ng-content select="[title]"></ng-content>
        <div *ngIf="title" wlc-dynamic-html [html]="title"></div>
    </div>
    <div wlc-icon
        class="{{$class}}__icon"
        [iconPath]="levelIcon"
    ></div>
</div>
<div class="{{$class}}__text">
    <ng-content></ng-content>
    <div *ngIf="text" wlc-dynamic-html [html]="text"></div>
</div>
