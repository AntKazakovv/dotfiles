<div class="{{$class}}__main" [class.with-text]="!!text">
    <div class="{{$class}}__title">
        <div wlc-dynamic-html [html]="title"></div>
    </div>
    <div wlc-icon
        class="{{$class}}__icon"
        [iconPath]="levelIcon"
    ></div>
</div>
<div *ngIf="text" class="{{$class}}__text">
    <div wlc-dynamic-html [html]="text"></div>
</div>
