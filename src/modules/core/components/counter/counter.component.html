<ng-template #default>({{count}})</ng-template>

<ng-template #circle>{{count}}</ng-template>

<ng-container [ngSwitch]="$params.theme">
    <ng-container *ngSwitchCase="'circle'" [ngTemplateOutlet]="circle"></ng-container>
    <ng-container *ngSwitchCase="'dot'"></ng-container>
    <ng-container *ngSwitchDefault [ngTemplateOutlet]="default"></ng-container>
</ng-container>
