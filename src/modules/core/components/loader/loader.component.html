<ng-container *ngIf="ringType">
    <ng-container *ngIf="$params.type === 'ring-with-logo'" [ngTemplateOutlet]="logoIcon">
    </ng-container>
    <div class="{{$class}}__element"></div>
</ng-container>

<ng-container *ngIf="$params.type === 'logo'" [ngTemplateOutlet]="logoIcon"></ng-container>

<ng-template #logoIcon>
    <div wlc-icon iconPath="{{$params.common.logoPath}}"></div>
</ng-template>
