<div class="{{$class}}__image"
     wlc-icon [iconPath]="$params.image">
</div>
<div class="{{$class}}__message">
    <h2 class="{{$class}}__title">
        {{'Ooops! It seems you lost yourself!' | translate}}
    </h2>
    <p>{{'We\'ll bring you back!' | translate}}</p>
</div>
<a *ngFor="let link of links "
    [uiSref]="link.state"
    [uiParams]="link.params"
    class="{{$class}}__link">
    <span>{{link.title | translate}}</span>
</a>
