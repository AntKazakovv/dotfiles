<span *ngIf="$params?.iconPath"
    wlc-icon
    class="{{$class}}__icon"
    [iconPath]="$params?.iconPath"
    [fallback]="$params?.iconFallback">
</span>
<span class="{{$class}}__content">
    {{$params?.text | translate}}
    <span *ngIf="useTitleLink"
        wlc-icon
        [iconPath]="$params.arrowLinkIconPath">
    </span>
</span>
