<div [ngClass]="{'container': $params.container}" class="{{$class}}__item">
    <div *ngIf="config.left" class="{{$class}}__left" wlc-wrapper
         [inlineParams]="config.left"
    ></div>

    <div class="{{$class}}__base" wlc-wrapper
         [inlineParams]="config.base"
    ></div>

    <div *ngIf="config.right" class="{{$class}}__right" wlc-wrapper
         [inlineParams]="config.right"
    ></div>
</div>
