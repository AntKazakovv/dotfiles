<div class="{{$class}}__list">
    <div *ngFor="let item of $params.socials"
         class="{{$class}}__item">
        <a [href]="item.link" class="{{$class}}__link" target="_blank">
            <span class="{{$class}}__icon"
                  wlc-icon
                  [iconPath]="getIconPath(item)">
            </span>
        </a>
    </div>
</div>
