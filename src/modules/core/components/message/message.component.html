<div class="wlc-notification-message__inner">
    <span *ngIf="icon && !image"
          class="wlc-notification-message__icon"
          wlc-icon
          [iconName]="icon">
    </span>

    <div *ngIf="image" class="wlc-notification-message__image-container">
        <img class="wlc-notification-message__image"
             [style.object-fit]="$params.imageFit"
             [src]="image.src"
             [alt]="image.alt">
    </div>

    <div class="wlc-notification-message__content">
        <h4 class="wlc-notification-message__heading">{{title | translate}}</h4>
        <span class="wlc-notification-message__message-container">
            <span class="wlc-notification-message__message">
                {{message | translate}}
            </span>
            <button *ngIf="action"
                    wlc-button
                    theme="borderless"
                    [text]="action.label"
                    (click)="action.onClick()"
            ></button>
        </span>
    </div>

    <button *ngIf="$params.showCloseButton"
            wlc-icon
            iconName="close"
            class="wlc-notification-message__dismiss"
            type="button"
            aria-label="Dismiss"
            title="Dismiss"
            (click)="meta.dismiss()"
    ></button>
</div>
