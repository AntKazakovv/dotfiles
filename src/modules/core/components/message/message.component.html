<div class="wlc-notification-message__inner" data-wlc-element="modal_password-recovery-2">
    <span *ngIf="icon && !image"
          class="wlc-notification-message__icon"
          wlc-icon
          [iconName]="icon">
    </span>

    <div *ngIf="image" class="wlc-notification-message__image-container">
        <img class="wlc-notification-message__image"
             [style.object-fit]="$params.imageFit"
             [src]="image.src"
             [alt]="image.alt">
    </div>

    <div class="wlc-notification-message__content">
        <h4 class="wlc-notification-message__heading" [attr.data-wlc-element]="'notification-title'">{{title | translate}}</h4>
        <span class="wlc-notification-message__message-container" [attr.data-wlc-element]="'notification-text'">
            <span class="wlc-notification-message__message">
                <ng-container *ngFor="let message of messages">
                    <ng-container *ngIf="message">
                        {{(message | translate) + '\n'}}
                    </ng-container>
                </ng-container>
            </span>
            <button *ngIf="action"
                    wlc-button
                    theme="borderless"
                    wlcElement="button_close"
                    [text]="action.label"
                    (click)="action.onClick()"
            ></button>
        </span>
    </div>

    <button *ngIf="$params.showCloseButton"
            wlc-icon
            iconName="close"
            class="wlc-notification-message__dismiss"
            wlcElement="button_close"
            type="button"
            aria-label="Dismiss"
            title="Dismiss"
            (click)="meta.dismiss()"
    ></button>
</div>
