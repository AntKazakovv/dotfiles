<ng-container *ngIf="$params.type === 'left-fixed' || $params.type === 'right-fixed'">
    <div *ngIf="useBackdrop"
        class="{{$class}}__backdrop"
        (click)="toggleFixedPanel(true)">
    </div>
</ng-container>

<ng-container [ngSwitch]="$params.type">
    <ng-container [ngTemplateOutlet]="headerLeftTypeFixed" *ngSwitchCase="'left-fixed'"></ng-container>
    <ng-container [ngTemplateOutlet]="headerDefault" *ngSwitchDefault></ng-container>
</ng-container>

<ng-container *ngIf="$params.useScroll; else noScrollBar">
    <div wlc-scrollbar
        class="{{$class}}__content"
        [update]="updateScrollbar">
        <ng-container [ngTemplateOutlet]="innerContent"></ng-container>
    </div>
</ng-container>

<ng-template #noScrollBar>
    <div class="{{$class}}__content">
        <ng-container [ngTemplateOutlet]="innerContent"></ng-container>
    </div>
</ng-template>

<ng-template #innerContent>
    <div class="{{$class}}__inner" [@innerAppearance]="animationState">
        <ng-content></ng-content>
    </div>
</ng-template>

<ng-template #close>
    <button *ngIf="$params.showClose;"
            wlc-icon
            class="{{$class}}__close"
            type="button"
            [attr.title]="'Close' | translate"
            [attr.aria-label]="'Close' | translate"
            iconPath="/wlc/icons/close.svg"
            (click)="closePanel()"
    ></button>
</ng-template>

<ng-template #headerDefault>
    <div *ngIf="$params.showHeader; else close" class="{{$class}}__header" [class.no-menu]="!headerMenuConfig">
        <div class="{{$class}}__title">
            {{title | translate}}
        </div>
        <div *ngIf="headerMenuConfig" class="{{$class}}__header-menu">
            <div wlc-wrapper [inlineParams]="headerMenuConfig"></div>
        </div>
        <ng-container [ngTemplateOutlet]="close"></ng-container>
    </div>
</ng-template>

<ng-template #headerLeftTypeFixed>
    <div class="{{$class}}__header">
        <button class="{{$class}}__btn-expand {{$class}}__btn-expand--{{fixedPanelState$ | async}}"
            (click)="toggleFixedPanel(true)">
            <span wlc-icon
                iconPath="/wlc/icons/burger-expand.svg"
            ></span>
        </button>
    </div>
</ng-template>
