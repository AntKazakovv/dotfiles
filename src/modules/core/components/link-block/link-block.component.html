<div class="{{$class}}__container" [attr.data-wlc-element]="$params.wlcElement + '-container'">
    <h3 *ngIf="$params.common.title"
        class="{{$class}}__title">
        {{$params.common.title | translate}}
    </h3>
    <h4 *ngIf="$params.common.subtitle"
        class="{{$class}}__subtitle">
        {{$params.common.subtitle | translate}}
    </h4>
    <div *ngIf="$params.common.link"
         class="{{$class}}__text">
        <button *ngIf="$params.common.useLinkButton; else withoutParamsUseLinkButton"
                wlc-button
                [attr.type]="'button'"
                text="{{$params.common.link}}"
                [iconPath]="btnIconPath"
                [theme]="buttonTheme"
                [wlcElement]="$params.wlcElement + '-button'"
                (click)="goTo($params.common.actionParams); $event.preventDefault();"
        >
        </button>
    </div>
</div>

<ng-template #withoutParamsUseLinkButton>
    <button wlc-button
            [attr.type]="'button'"
            text="{{$params.common.link}}"
            [wlcElement]="$params.wlcElement + '-button'"
            icon="default"
            [theme]="buttonTheme"
            (click)="goTo($params.common.actionParams); $event.preventDefault();"
    >
</button>
</ng-template>
