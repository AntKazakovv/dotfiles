<div *ngIf="!errors.length else controlWithErrors"
     class="{{className}}__icon form-control__icon">
    <div *ngIf="!isValueEmpty"
         class="icon">
        <div wlc-icon
             *ngIf="control.valid && !control.pending"
             class="icon-valid"
             iconPath="/wlc/icons/valid.svg">
        </div>
    </div>
</div>

<ng-template #controlWithErrors>
    <div *ngIf="control.invalid && control.touched && errors.length"
         class="{{className}}__icon form-control__icon">
        <div wlc-icon
             class="icon-invalid"
             containerClass="form-control-tooltip tooltip-error"
             [tooltip]="errorsRef"
             container="form-control"
             placement="bottom"
             iconPath="/wlc/icons/invalid.svg">
        </div>
    </div>
</ng-template>

<ng-template #errorsRef>
    <ul class="form-control__errors">
        <li *ngFor="let error of errors">
            {{error | translate}}
        </li>
    </ul>
</ng-template>
