<ng-template #default>
    <div *ngIf='ready'
         class="{{$class}}__content"
         [@tableAppearance]="paginatedRows.length + indexFactor">

        <div *ngIf="rows.length" class="{{$class}}__row {{$class}}__row--head">
            <span *ngFor="let col of head"
                  class="{{$class}}__cell {{$class}}__cell--{{col.key}}"
                  [class.has-description]="col.description"
                  [attr.data-wlc-element]="col.wlcElement">
                    <span>{{col.title | translate}}</span>
                    <span *ngIf="col.description"
                          wlc-tooltip
                          class="{{$class}}-icon__description"
                          [inlineParams]="{inlineText: col.description | translate, placement: 'top'}">
                    </span>
            </span>
        </div>

        <div *ngFor="let item of paginatedRows; index as $index"
             class="{{$class}}__row"
             [ngClass]="[$class + '__row--' + (($index % 2) ? 'even' : 'odd'), item.opened ? 'wlc-show':'']">
            <div *ngFor="let col of head; let $first = first"
                 class="{{$class}}__cell {{$class}}__cell--{{col.key}}"
                 [ngClass]="[$first ? $class + '__cell--first' : '', (col.disableHideClass || $first) ? '' : 'wlc-cell-hide']"
                 [attr.data-wlc-element]="col.wlcElement"
                 [@toggle]="animationStatus(col, item, $first)"
                 (click)="$first ? item.toggleRow() : null"
            >
                <ng-container [ngSwitch]="col.type">
                    <div class="{{$class}}__cell-label"
                         [class.has-description]="col.description">
                           <span>{{col.title | translate}}:</span>
                           <span *ngIf="col.description"
                                 wlc-tooltip
                                 class="{{$class}}-icon__description"
                                 [inlineParams]="{inlineText: col.description | translate}">
                            </span>
                    </div>

                    <div *ngSwitchCase="'component'" class="{{$class}}__cell-content">
                        <ng-container [ngComponentOutlet]="$any(col.componentClass)"
                                      [ngComponentOutletInjector]="getComponentInjector(item, $index + indexFactor, col)">
                        </ng-container>
                    </div>

                    <div *ngSwitchDefault class="{{$class}}__cell-content">
                        {{item.getValue(col, $index + indexFactor) | translate}}
                    </div>
                </ng-container>

                <div *ngIf="$first"
                     wlc-icon
                     class="{{$class}}__cell-arrow"
                     iconPath="/wlc/icons/arrow.svg">
                </div>
            </div>
        </div>
    </div>
    <div
         wlc-pagination
         *ngIf="$params.pagination?.use"
         [items]="rows"
         [settings]="$params.pagination"
         (paginationOnChange)="paginationOnChange($event)">
    </div>
</ng-template>

<ng-template #tournaments>
    <div *ngIf="ready"
         class="{{$class}}__content"
         [ngClass]="{'content-one': paginatedRows.length === 1,'content-small': paginatedRows.length < 4}">

        <div *ngIf="rows.length"
             class="{{$class}}__row {{$class}}__row--head">
            <span *ngFor="let col of head"
                  class="{{$class}}__cell {{$class}}__cell--{{col.key}}"
                  [attr.data-wlc-element]="col.wlcElement">
                {{col.title | translate}}
            </span>
        </div>

        <div *ngFor="let item of paginatedRows; index as $index"
             class="{{$class}}__row"
             [ngClass]="[$class + '__row--' + (($index % 2) ? 'even' : 'odd')]">
            <div *ngFor="let col of head; let $first = first"
                 class="{{$class}}__cell {{$class}}__cell--{{col.key}}"
                 [ngClass]="[$first ? $class + '__cell--first' : '']"
                 [attr.data-wlc-element]="col.wlcElement"
            >
                <ng-container [ngSwitch]="col.type">
                    <div class="{{$class}}__cell-label">{{col.title | translate}}:</div>

                    <div *ngSwitchCase="'component'" class="{{$class}}__cell-content">
                        <ng-container [ngComponentOutlet]="$any(col.componentClass)"
                                      [ngComponentOutletInjector]="getComponentInjector(item, $index, col)">
                        </ng-container>
                    </div>

                    <div *ngSwitchDefault class="{{$class}}__cell-content">
                        {{item.getValue(col, $index) | translate}}
                    </div>
                </ng-container>
            </div>
        </div>
    </div>

    <button
        *ngIf="rows.length > itemPerPage && !toggled"
        wlc-button
        [attr.type]="'button'"
        text="Show more"
        (click)="toggleRows()">
    </button>

    <button *ngIf="toggled"
            wlc-button
            [attr.type]="'button'"
            text="Show less"
            (click)="toggleRows()">
    </button>
</ng-template>


<ng-container [ngSwitch]="theme">

    <ng-container *ngSwitchCase="'tournaments'" [ngTemplateOutlet]="tournaments">
    </ng-container>

    <ng-container *ngSwitchDefault [ngTemplateOutlet]="default">
    </ng-container>

</ng-container>
