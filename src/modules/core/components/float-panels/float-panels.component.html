<div class="{{$class}}__backdrop"
     *ngIf="openedPanel"
     (click)="closePanel(openedPanel)"></div>

<ng-container *ngFor="let section of shownSections">
    <div wlc-burger-panel
         tabindex="-1"
         [isOpened]="openedPanel === section.name"
         [inlineParams]="getBurgerPanel(section.name)"
         [id]="section.name">
        <div wlc-layout
             [sectionName]="section.name"
             [layouts]="'panels'"
        ></div>
    </div>
</ng-container>
