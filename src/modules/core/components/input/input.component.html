<ng-template #default>
    <ng-container [ngTemplateOutlet]="label"></ng-container>
    <div class="{{$class}}__input">
        <input type="text" class="hidden-input" *ngIf="$params.common?.type==='password'">
        <input type="{{$params.common?.type || 'text'}}"
               id="{{$params.id || $params.name}}"
               placeholder="{{$params.exampleValue || $params.common?.placeholder | translate}}"
               #input
               [wlc-input-mask]="$any($params.maskOptions)"
               [attr.data-wlc-element]='fieldWlcElement'
               [attr.autocomplete]="$params.common?.autocomplete"
               [formControl]="control"
               (input)="onInput($event)"
               (blur)="onBlur($event)"
        >
        <ng-container
            *ngIf="$params.common?.usePasswordVisibilityBtn"
            [ngTemplateOutlet]="password">
        </ng-container>
        <ng-container
            *ngIf="$params.clipboard"
            [ngTemplateOutlet]="clipboard">
        </ng-container>
        <ng-container
            *ngIf="$params.showCurrency"
            [ngTemplateOutlet]="currency">
        </ng-container>
        <ng-container [ngTemplateOutlet]="status"></ng-container>
    </div>
</ng-template>

<ng-template #placeholderShown>
    <input type="text" class="hidden-input" *ngIf="$params.common?.type==='password'">
    <input type="{{$params.common?.type || 'text'}}"
           id="{{$params.id || $params.name}}"
           #input
           [wlc-input-mask]="$any($params.maskOptions)"
           placeholder="{{$params.exampleValue || $params.common?.placeholder | translate}}"
           [formControl]="control"
           [attr.data-wlc-element]='fieldWlcElement'
           [attr.autocomplete]="$params.common?.autocomplete"
           class="{{$class}}__input"
           (input)="onInput($event)"
           (blur)="onBlur($event)"
    >
    <ng-container [ngTemplateOutlet]="label"></ng-container>
    <ng-container [ngTemplateOutlet]="status"></ng-container>
</ng-template>

<ng-template #vertical>
    <ng-container [ngTemplateOutlet]="label"></ng-container>
    <div
        class="{{$class}}__container"
    >
        <input type="text" class="hidden-input" *ngIf="$params.common?.type==='password'">
        <input
            type="{{$params.common?.type || 'text'}}"
            id="{{$params.id || $params.name}}"
            #input
            [value]="$params.value"
            [wlc-input-mask]="$any($params.maskOptions)"
            [readOnly]="$params.common?.readonly"
            placeholder="{{$params.exampleValue || $params.common?.placeholder | translate}}"
            [formControl]="control"
            [attr.data-wlc-element]='fieldWlcElement'
            [attr.autocomplete]="$params.common?.autocomplete"
            class="{{$class}}__input"
            [ngClass]="setInputModifiers"
            (input)="onInput($event)"
            (blur)="onBlur($event)"
        >
        <ng-container
            *ngIf="$params.common?.usePasswordVisibilityBtn"
            [ngTemplateOutlet]="password">
        </ng-container>
        <ng-container
            *ngIf="$params.clipboard"
            [ngTemplateOutlet]="clipboard">
        </ng-container>
        <ng-container
            *ngIf="$params.showCurrency"
            [ngTemplateOutlet]="currency">
        </ng-container>
        <ng-container [ngTemplateOutlet]="status"></ng-container>
    </div>
</ng-template>

<ng-container [ngSwitch]="$params.theme">
    <ng-container [ngTemplateOutlet]="placeholderShown" *ngSwitchCase="'placeholder-shown'"></ng-container>
    <ng-container [ngTemplateOutlet]="vertical" *ngSwitchCase="'vertical'"></ng-container>
    <ng-container [ngTemplateOutlet]="default" *ngSwitchDefault></ng-container>
</ng-container>

<ng-template #label>
    <label *ngIf="$params.common?.useLabel"
           for="{{$params.id || $params.name}}"
           class="{{$class}}__label">
        {{inputLabel | translate}}
        <ng-container *ngIf="isFieldRequired()">*</ng-container>
    </label>
    <div *ngIf="useTooltip"
         wlc-tooltip
         [inlineParams]="tooltipParams"
    ></div>
</ng-template>

<ng-template #status>
    <div *ngIf="$params.name && $params.validators?.length"
         class="{{$class}}-status"
         wlc-form-control
         [className]="$class"
         [control]="control"
         [fieldName]="$params.name.toLowerCase()"
         [validators]="$params.validators"
    ></div>
</ng-template>

<ng-template #clipboard>
    <button
        wlc-icon
        class="field-icon field-icon--copy"
        iconPath="/wlc/icons/copy.svg"
        [wlc-copy-to-clipboard]="control.value"
        (copied)="onClipboardCopied()"
    ></button>
</ng-template>

<ng-template #password>
    <span
        wlc-icon
        class="field-icon field-icon--eye"
        data-password-visibility
        iconPath="/wlc/icons/eye.svg"
        (mousedown)="toggleType('text')"
        (mouseup)="toggleType('password')"
        (touchstart)="toggleType('text')"
        (touchend)="toggleType('password')"
    ></span>
</ng-template>

<ng-template #currency>
    <span
        class="field-icon field-icon--currency"
        wlc-currency
        [showIconOnly]="true"
        indicatorFormat="narrowSymbol"
    ></span>
</ng-template>
