<div class="{{$class}}-wrp">
    <ng-container *ngIf="isAffiliate; then href; else sref"></ng-container>
</div>

<ng-template #sref>
    <ng-container *ngIf="logoName; else logoUrl">
        <a wlc-icon
            class="{{$class}}__image"
            [uiSref]="$params.link"
            [uiParams]="$params.uiParams"
            [uiOptions]="$params.uiOptions"
            [iconName]="logoImageSource"
            [showSvgAsImg]="$params.image.showSvgAsImg"
        ></a>
    </ng-container>
</ng-template>

<ng-template #href>
    <ng-container *ngIf="logoName; else logoUrlAffHref">
        <a wlc-icon
            class="{{$class}}__image"
            [href]="siteLink"
            [target]="$params.target"
            [iconName]="logoImageSource"
            [showSvgAsImg]="$params.image.showSvgAsImg"
        ></a>
    </ng-container>
</ng-template>

<ng-template #logoUrl>
    <a wlc-icon
        class="{{$class}}__image"
        [uiSref]="$params.link"
        [uiParams]="$params.uiParams"
        [uiOptions]="$params.uiOptions"
        [iconUrl]="logoImageSource"
        [showSvgAsImg]="$params.image.showSvgAsImg"
    ></a>
</ng-template>

<ng-template #logoUrlAffHref>
    <a wlc-icon
        class="{{$class}}__image"
        [href]="siteLink"
        [target]="$params.target"
        [iconUrl]="logoImageSource"
        [showSvgAsImg]="$params.image.showSvgAsImg"
    ></a>
</ng-template>
