<span class="action-text">{{$params.transaction.type | translate}}</span>

<button *ngIf="showCancelButton"
        wlc-button
        class="action-btn"
        [inlineParams]="$params.btnsParams.cancelBtnParams"
        (click)="cancel()">
</button>

<button *ngIf="showConfirmButton"
        wlc-button
        class="action-btn"
        [inlineParams]="$params.btnsParams.confirmBtnParams"
        (click)="confirm()">
</button>
