<span class="{{$class}}__time">{{date}}</span>
<div class="{{$class}}__amount">
    <span wlc-currency
          class="{{$class}}__currency"
          [value]="amount"
          [showValueOnly]="true"
    ></span>
    <span wlc-icon
          class="{{$class}}__currency-icon"
          [iconPath]="getIconUrl(currency)"
    ></span>
</div>
