<span class="{{$class}}__time">{{date}}</span>
<div class="{{$class}}__amount">
    <span wlc-currency
          class="{{$class}}__currency"
          [value]="amount"
          [currency]= "WalletHelper.conversionCurrency ?? currency"
          [showValueOnly]="!WalletHelper.conversionCurrency"
    ></span>
    <span wlc-icon
          class="{{$class}}__currency-icon"
          [iconPath]="WalletHelper.getCurrencyIconUrl(currency)"
    ></span>
</div>
