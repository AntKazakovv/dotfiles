<div *ngIf="isReady; else preloader">
    <div *ngIf="$params.showTitle"
         wlc-title
         [mainText]="data.title">
    </div>

    <a *ngIf="$params.downloadPdf?.use"
        class="{{$class}}__download"
        [ngClass]="{'disabled': isDownloadingFile}"
        (click)="downloadPdf()">
        <span class="{{$class}}__download-text">
            {{'Download PDF file' | translate}}
        </span>
        <span wlc-icon
            class="icon-btn"
            [iconPath]="$params.downloadPdf.iconPath"
            wlcElement="button_terms">
        </span>
    </a>

    <div wlc-dynamic-html
         [html]="html"
         [parseAsPlainHTML]="parseAsPlainHTML"
         [withoutCompilation]="withoutCompilation"
         [shouldClearStyles]="shouldClearStyles"
         #wrp>
    </div>
</div>

<ng-template #preloader>
    <div wlc-loader></div>
</ng-template>
