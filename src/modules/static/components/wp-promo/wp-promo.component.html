<ng-container *ngIf="items.length">
    <div *ngIf="$params.titleComponentParams.mainText"
        wlc-title
        class="{{$class}}__title"
        [inlineParams]="$params.titleComponentParams"
    ></div>
    <div class="{{$class}}__wrapper-list">
        <ng-container *ngFor="let item of items;"
            [ngTemplateOutlet]="wpItem"
            [ngTemplateOutletContext]="{item}"
        >
        </ng-container>
    </div>
</ng-container>

<ng-template #wpItem let-item="item">
    <div class="{{$class}}__wrapper"
        [style.background-image]="item.bgImageUrl"
        [ngClass]="{'full-width-item': item.isFullscreenWidth}"
    >
        <div class="{{$class}}__content"
            [ngClass]="{'linear-gradient': item.useBgGradient}"
        >
            <div class="{{$class}}__info">
                <h4 class="{{$class}}__name">{{item.title}}</h4>
                <div class="{{$class}}__description">{{item.description}}</div>
            </div>
            <div *ngIf="isMobileBanner"
                class="{{$class}}__content--mobile"
                [wlc-link]="[item.buttonSref]">
            </div>
            <div *ngIf="!isMobileBanner" class="{{$class}}__btns">
                <button *ngIf="item.buttonText && item.buttonSref"
                        wlc-button
                        class="{{$class}}__button"
                        [typeAttr]="$params.redirectButton.common.typeAttr"
                        [text]="item.buttonText"
                        [wlc-link]="[item.buttonSref, item.buttonSrefParams]">
                ></button>
                <button *ngIf="item.html"
                        wlc-button
                        class="{{$class}}__button"
                        [inlineParams]="$params.modalButton"
                        (click)="openDescription(item)"
                ></button>
                <button *ngIf="item.buttonText && item.href"
                    wlc-button
                    class="{{$class}}__button"
                    [text]="item.buttonText"
                    [href]="item.href"
                ></button>
            </div>
        </div>
        <img *ngIf="item.decorImageUrl"
            class="{{$class}}__decor"
            src="{{item.decorImageUrl}}"/>
    </div>
</ng-template>
