<div wlc-input [inlineParams]="$params.email"></div>
<button *ngIf="verificationBtn"
        wlc-button
        typeAttr="button"
        text="{{$params.verifyBtnText}}"
        theme="resolve"
        [class.disabled]="waitMailVerification$ | async"
        (click)="sendLink()"
        [wlcElement]="'verify-email-btn'">
</button>
