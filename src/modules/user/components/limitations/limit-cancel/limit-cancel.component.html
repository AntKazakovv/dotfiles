<button *ngIf="cancelable; else noCancel"
        wlc-button
        [attr.type]="'button'"
        themeMod="secondary"
        text="Cancel"
        [type]="pending ? 'pending' : 'default'"
        [wlcElement]="'button_cancel'"
        (click)="cancel()">
</button>

<ng-template #noCancel>
    <div class="no-cancel">
        -
    </div>
</ng-template>
