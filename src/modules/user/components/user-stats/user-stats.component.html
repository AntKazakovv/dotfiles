<div class="{{$class}}__content" [ngSwitch]="type">

    <ng-template [ngSwitchCase]="'short'">
        <div class="{{$class}}-balance {{$class}}-balance--short" data-wlc-element="block_info">
            <div class="{{$class}}-balance__item {{$class}}-balance__real" data-wlc-element="user-stat-balance_real">
                <span class="name">{{'Real balance' | translate}}</span>
                <span class="value">
                    <span wlc-currency [value]="shownUserStats?.balance?.value"></span>
                </span>
            </div>

            <div class="{{$class}}-balance__item {{$class}}-balance__bonus" data-wlc-element="user-stat-balance_bonus">
                <span class="name">{{'Bonus balance' | translate}}</span>
                <span class="value">
                    <span wlc-currency [value]="shownUserStats?.bonusBalance?.value">
                    </span>
                </span>
            </div>
        </div>
    </ng-template>

    <ng-template [ngSwitchCase]="'store'">
        <div class="{{$class}}-balance {{$class}}-balance--store" data-wlc-element="block_info">
            <div class="{{$class}}-balance__item {{$class}}-balance__item--points" [attr.data-wlc-element]="shownUserStats?.points?.wlcElement">
                <span class="value" wlc-currency currency="LP" [value]="shownUserStats?.points?.value" digitsInfo="1-0-2"></span>
            </div>
            <div class="{{$class}}-balance__item {{$class}}-balance__item--exppoints" [attr.data-wlc-element]="shownUserStats?.expPoints?.wlcElement">
                <span class="value" wlc-currency currency="EXP" [value]="shownUserStats?.expPoints?.value" digitsInfo="1-0-2"></span>
            </div>
        </div>
    </ng-template>

    <ng-template [ngSwitchCase]="'default'">

        <div class="{{$class}}-balance">
            <div class="{{$class}}-balance__item {{$class}}-balance__item--{{item}}"
                 *ngFor="let item of $params.fields" [attr.data-wlc-element]="shownUserStats[item]?.wlcElement">
                <ng-container [ngSwitch]="shownUserStats[item]?.modification">

                    <span class="name">{{shownUserStats[item]?.name | translate}}</span>
                    <span class="value" *ngSwitchDefault>
                        {{(shownUserStats[item]?.value | number: '.0-2') || 'Unknown' | translate}}
                    </span>
                    <span class="value" *ngSwitchCase="'string'">
                        {{this.shownUserStats[item]?.value?.toString() || 'Unknown' | translate}}
                    </span>
                    <span class="value" *ngSwitchCase="'amount'">
                        <span wlc-currency [value]="shownUserStats[item]?.value"></span>
                    </span>
                    <span class="value" *ngSwitchCase="'customCurrency'">
                        <span wlc-currency [currency]="shownUserStats[item].currency" [value]="shownUserStats[item]?.value" digitsInfo="1-0-2" [hideSvgName]="true"></span>
                    </span>
                </ng-container>
            </div>
        </div>

        <button
            *ngIf="useDepositBtn"
            wlc-button
            class="wlc-btn-deposit"
            text="Deposit"
            (click)="depositAction()"
            wlcElement="button-deposit"
        ></button>
    </ng-template>
</div>

<span *ngIf="$params.showTooltipDescriptionModal"
       wlc-tooltip
       class="{{$class}}-description-currency"
       [inlineParams]="{modal: 'descriptionCasinosCurrency'}"></span>
