<div class="{{$class}}__content" [ngSwitch]="type">

    <ng-template [ngSwitchCase]="'short'">
        <div class="{{$class}}-balance {{$class}}-balance--short" data-wlc-element="block_user-stat-balance">
            <div class="{{$class}}-balance__item {{$class}}-balance__real">
                <span class="name">{{'Real balance' | translate}}</span>
                <span class="value">
                    <span wlc-currency [value]="shownUserStats?.balance?.value"></span>
                </span>
            </div>

            <div class="{{$class}}-balance__item {{$class}}-balance__bonus">
                <span class="name">{{'Bonus balance' | translate}}</span>
                <span class="value">
                    <span wlc-currency [value]="shownUserStats?.bonusBalance?.value">
                    </span>
                </span>
            </div>
        </div>
    </ng-template>

    <ng-template [ngSwitchCase]="'default'">

        <div class="{{$class}}-balance">
            <div class="{{$class}}-balance__item {{$class}}-balance__item--{{item}}"
                 *ngFor="let item of $params.fields">
                <ng-container [ngSwitch]="shownUserStats[item]?.modification">

                    <span class="name">{{shownUserStats[item]?.name | translate}}</span>
                    <span class="value" *ngSwitchDefault>
                        {{(shownUserStats[item]?.value | number: '.0-2') || 'Unknown' | translate}}
                    </span>
                    <span class="value" *ngSwitchCase="'amount'">
                        <span wlc-currency [value]="shownUserStats[item]?.value"></span>
                    </span>
                </ng-container>
            </div>
        </div>

        <button
            *ngIf="useDepositBtn"
            wlc-button
            class="wlc-btn-deposit"
            text="Deposit"
            (click)="depositAction()"
        ></button>
    </ng-template>
</div>
