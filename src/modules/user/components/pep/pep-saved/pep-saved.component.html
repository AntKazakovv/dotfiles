<div class="{{$class}}__message">
    <span>{{phrases.modals.saved.success | translate}}</span>
    <span>
        <ng-container *ngIf="isMarkedAsPep then pep else notPep"></ng-container>
    </span>
</div>

<ng-template #pep>
    {{phrases.modals.saved.markedAsPep | translate}}
</ng-template>

<ng-template #notPep>
    {{phrases.modals.saved.markedAsNotPep | translate}}
</ng-template>
