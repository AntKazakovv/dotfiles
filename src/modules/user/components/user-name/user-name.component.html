<div class="{{$class}}__email" data-wlc-element="block_user-stat-username">
    <div wlc-icon
         class="{{$class}}__email-icon"
         wlcElement="wlc-icon-user"
         iconPath="/wlc/icons/user-icon.svg"
         [showSvgAsImg]="$params.showSvgAsImg"
    ></div>

    <div class="{{$class}}__email-value"
        data-wlc-element="input_email">
        {{displayedName | truncate: $params.userNameLength}}
    </div>
</div>
