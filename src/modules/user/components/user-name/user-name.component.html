<div class="{{$class}}__email" data-wlc-element="block_user-stat-username">
    <div
        class="{{$class}}__email-icon"
        wlc-icon
        [wlcElement]="'wlc-icon-user'"
        iconName="user-icon"
    ></div>

    <div class="{{$class}}__email-value"
        data-wlc-element="input_email">
        <ng-container *ngIf="firstName || lastName; else emailContent">
            {{firstName + ' ' + lastName | truncate: $params.userNameLength}}
        </ng-container>
        <ng-template #emailContent>{{email | truncate: $params.userNameLength}}</ng-template>
    </div>
</div>
