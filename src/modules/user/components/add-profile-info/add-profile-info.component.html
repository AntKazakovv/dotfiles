<div wlc-text-block
     [textBlockTitle]="$params.title"
     [textBlockText]="$params.description"
></div>

<div class="{{$class}}__form"
     wlc-form-wrapper
     [ngSubmit]="onSubmit.bind(this)"
     [formData]="$params.formData"
     [config]="formConfig"
     [errors]="errors$.asObservable()"
     [beforeSubmit]="beforeSubmit.bind(this)">
</div>
