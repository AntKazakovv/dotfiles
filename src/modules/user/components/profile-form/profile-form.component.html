<div class="{{$class}}__form"
     wlc-form-wrapper
     [config]="$params.config"
     [formData]="userProfile"
     [ngSubmit]="ngSubmit.bind(this)"
></div>

<div class="{{$class}}__add">
    <div class="{{$class}}__block">
        <div
            class="{{$class}}__title"
            wlc-title [mainText]="$params.additionalBlocks.subscriptions.title"
            [mainTag]="'span'"
        ></div>
        <div class="{{$class}}__item" data-wlc-element="block_subscriptions">
            <div class="{{$class}}__item-title">
                <div class="{{$class}}__item-title-main">{{'Notifications via e-mail' | translate}}</div>
            </div>
            <div class="{{$class}}__item-switcher">
                <div wlc-checkbox [inlineParams]="toggleBtn"></div>
            </div>
        </div>
    </div>

    <div class="{{$class}}__block">
        <div
            class="{{$class}}__title"
            wlc-title [mainText]="$params.additionalBlocks.security.title"
            [mainTag]="'span'"
        ></div>
        <div class="{{$class}}__item" data-wlc-element="block_edit-password">
            <div class="{{$class}}__item-title">
                <div class="{{$class}}__item-title-main">
                    {{'Password' | translate}}
                </div>
                <div class="{{$class}}__item-title-description">
                    {{'You can change your password here.' | translate}}
                </div>
            </div>
            <button wlc-button
                    [wlcElement]="'button_change-password'"
                    [icon]="'arrow'"
                    (click)="changePasswordModal()"
                    text="Change"></button>
        </div>

       <!-- <div class="{{$class}}__item" data-wlc-element="block_banking-info">
            <div class="{{$class}}__item-title">
                <div class="{{$class}}__item-title-main">
                    {{'Banking information' | translate}}
                </div>
                <div class="{{$class}}__item-title-description">
                    {{'You can add your banking information here.' | translate}}
                </div>
            </div>
            <button wlc-button
                    [wlcElement]="'button_add-banking-info'"
                    [icon]="'arrow'"
                    (click)="addBankingInformation()"
                    text="Add info"></button>
        </div>-->
    </div>
</div>
