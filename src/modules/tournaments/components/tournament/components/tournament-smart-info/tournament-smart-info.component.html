<div class="{{$class}}__content" *ngIf="tournament; else: noData">

    <div wlc-timer
        class="{{$class}}__timer-block"
        [value]="tournament.stateDateTournament"
        [text]="getTimerText()"
        (timerEnds)="updateTournaments()">
    </div>
    <div class="{{$class}}__delimiter"></div>
    <div class="{{$class}}__prize-block">
        <div wlc-icon
             class="{{$class}}__prize-block--icon"
             iconPath="/wlc/icons/pool.svg">
        </div>
        <div class="{{$class}}__prize-block__text">
            <div class="{{$class}}__prize-block__text--subtitle">
                {{$params.common?.prizePoolText | translate}}
            </div>
            <div wlc-tournament-prizes-row
                class="{{$class}}__prize-block__text--value"
                [inlineParams]="{theme: 'default', themeMod: 'one-line'}"
                [prizes]="tournament.prizePool">
            </div>
        </div>
    </div>
</div>

<ng-template #noData>
    <div class="{{$class}}__nocontent">
        <div wlc-loader></div>
    </div>
</ng-template>
