<ng-template #join>
    <div class="{{$class}}__container">
        <div *ngIf="$params.common.feeCurrency !== 'LP'; else userPoints" class="{{$class}}__text">
            {{'Real balance' | translate}}: <span wlc-currency [value]="$params.common.userBalance"></span>
        </div>
        <ng-template #userPoints>
            <div class="{{$class}}__text">
                {{'You have' | translate}}:
                <span wlc-currency
                      class="{{$class}}__lpblock"
                      currency="LP"
                      [value]="$params.common.userBalance">
                </span>
            </div>
        </ng-template>
        <div *ngIf="$params.common.feeCurrency !== 'LP'; else tournamentPoints" class="{{$class}}__text">
            {{'Entry fee' | translate}}: <span wlc-currency [value]="$params.common.feeAmount"></span>
        </div>
        <ng-template #tournamentPoints>
            <div class="{{$class}}__text">
                {{'Entry fee' | translate}}:
                <span wlc-currency
                      class="{{$class}}__lpblock"
                      currency="LP"
                      [value]="$params.common.feeAmount">
                </span>
            </div>
        </ng-template>
        <div class="{{$class}}__text">
            {{$params.common.text | translate}}
        </div>
    </div>
</ng-template>

<ng-template #leave>
    <div class="{{$class}}__text">
        {{$params.common.text | translate}}
    </div>
</ng-template>


<ng-container [ngSwitch]="$params.common.actionType">
    <ng-container *ngSwitchCase="'leave'" [ngTemplateOutlet]="leave"></ng-container>
    <ng-container *ngSwitchDefault [ngTemplateOutlet]="join" ></ng-container>
</ng-container>
