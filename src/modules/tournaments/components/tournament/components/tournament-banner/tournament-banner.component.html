<ng-container [ngSwitch]="$params.theme">
    <ng-container *ngSwitchCase="'wolf'" [ngTemplateOutlet]="themeWolf"></ng-container>
    <ng-container *ngSwitchDefault [ngTemplateOutlet]="default"></ng-container>
</ng-container>

<ng-template #default>
    <div class="{{$class}}" [style]="{backgroundImage: 'url(' + backgroundImgUrl + ')'}">
        <div class="{{$class}}__tag">{{'Tournaments' | translate}}</div>
        <div class="{{$class}}__status"
            [ngClass]="tagClass">
            {{tournament.tag | translate}}
        </div>
        <div class="{{$class}}__more-icon">
            <div wlc-icon
                class="icon-btn"
                iconPath="/wlc/icons/info.svg"
                wlcElement="button_terms"
                (click)="readMore()">
            </div>
        </div>
        <div class="{{$class}}__body">
            <h2 class="{{$class}}__body-title"
                [title]="tournament.name">
                {{tournament.name}}
            </h2>
            <div  wlc-tournament-smart-info
                class="{{$class}}__timer-block"
                [tournament]="tournament"
                (timerEnds)="updateTournaments()">
            </div>

            <div class="{{$class}}__description"
                [title]="tournament.descriptionClean">
                <p [innerHtml]="tournament.descriptionSafeHTML | safeValue:'html'"></p>
            </div>

            <div class="buttons-wrap">
                <ng-container *ngIf="showJoin">
                    <button *ngIf="!tournament.onlyForLevels; else lockBtn"
                        class="join-btn"
                        wlc-button
                        text="Join"
                        (click)="joinToTournament()">
                    </button>
                </ng-container>
                <button wlc-button
                    themeMod="secondary"
                    customMod="theme-mod-read"
                    [text]="'Read more'"
                    (click)="readMore()">
                </button>
            </div>
            <div *ngIf="!isAlternative"
                class="{{$class}}__body-decor"
                [style]="{backgroundImage: 'url(' + tournament.imageOther + ')'}">
            </div>
        </div>
    </div>
    <div *ngIf="pending" class="{{$class}}__loader"></div>
</ng-template>

<ng-template #lockBtn>
    <div class="{{$class}}__lock-btn">
        <span wlc-icon
            class="lock-btn__icon"
            iconPath="/wlc/icons/lock-icon.svg"></span>
        <span class="lock-btn__text">{{lockBtnText | translate}}</span>
    </div>
</ng-template>

<ng-template #themeWolf>
    <div class="{{$class}}"
        [style]="{backgroundImage: 'url(' + tournament.image + ')'}"
        (click)="readMore()">
        <span  wlc-tag
            class="{{$class}}__header-info--status"
            [theme]="'flag'"
            [inline]="tagConfig"
            [title]="tournament.tag">
        </span>
        <div class="{{$class}}__body">
            <div class="{{$class}}__body-text">
                <h2 class="{{$class}}__title" [title]="tournament.name">
                    {{tournament.name}}
                </h2>
                <div wlc-tournament-prizes-row
                    class="{{$class}}__prizepool"
                    [inlineParams]="{theme: 'wolf', themeMod: 'short-line'}"
                    [prizes]="tournament.prizePool">
                </div>
            </div>
            <div wlc-timer
                class="{{$class}}-timer"
                theme="wolf"
                [value]="tournament.stateDateTournament"
                [text]="tournament.timerText"
                (timerEnds)="updateTournaments()">
            </div>
            <div class="{{$class}}__body-decor" [style]="{backgroundImage: 'url(' + tournament.imageOther + ')'}"></div>
        </div>
    </div>
    <div *ngIf="pending" class="{{$class}}__loader"></div>
</ng-template>
