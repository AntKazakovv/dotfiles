<ng-container [ngSwitch]="$params.theme">
    <ng-container [ngTemplateOutlet]="default" *ngSwitchDefault></ng-container>
    <ng-container [ngTemplateOutlet]="alternative" *ngSwitchCase="'alternative'"></ng-container>
</ng-container>

<ng-template #default>
    <div *ngIf="tournament" class="{{$class}}__container">
        <div class="{{$class}}__info">
            <img [wlc-fallback]="tournament.fallbackImagePromo"
                 [src]="tournament.imagePromo"
                 class="{{$class}}__image {{$class}}__image--mobile"
                 loading="lazy">
            <div class="{{$class}}__inner">
                <div class="{{$class}}__tag">
                    <span class="{{$class}}__tag-text"
                          [class.active]="tournament.isSelected"
                    >{{tournament.tag | translate}}</span>
                </div>
                <h3 class="{{$class}}__title">{{tournament.name}}</h3>
                <div class="{{$class}}__description" [wlc-clamp]="$params.descriptionClamp">
                    <div [innerHtml]="tournament.descriptionSafeHTML | safeHtml"></div>
                </div>
            </div>
        </div>
        <div class="{{$class}}__board">
            <img [wlc-fallback]="tournament.fallbackImagePromo"
                 [src]="tournament.imagePromo"
                 class="{{$class}}__image {{$class}}__image--desk"
                 loading="lazy">
            <div class="{{$class}}__inner">
                <h4 class="{{$class}}__board-title">
                    {{'Prize pool' | translate}}
                </h4>
                <div wlc-tournament-prizes-row
                    class="{{$class}}__prizepool"
                    [inlineParams]="{theme: 'default'}"
                    [prizes]="tournament.prizePool"
                    >
                </div>

                <div wlc-timer
                     class="{{$class}}-timer"
                     [value]="tournament.stateDateTournament"
                     [text]="getTimerText()"
                     (timerEnds)="updateTournaments()">
                </div>
                <div wlc-tournament-prizes
                     class="{{$class}}-prizes"
                     [tournament]="tournament">
                </div>

                <span *ngIf="tournament.prizeTable.length > rowLimit"
                      wlc-link-block
                      link="See all prizes"
                      (click)="readMore(true)"
                ></span>
            </div>
        </div>

        <div class="buttons-wrap">
            <button
                *ngIf="!isProcessed && !isTournamentSelected && tournament.isTournamentStarts"
                wlc-button
                text="Join now"
                (click)="joinToTournament()">
            </button>
            <button
                wlc-button
                themeMod="secondary"
                [text]="'Read more'"
                (click)="readMore()">
            </button>
        </div>

        <div *ngIf="pending" class="{{$class}}__loader"></div>
    </div>
</ng-template>

<ng-template #alternative>
    <div *ngIf="tournament" class="{{$class}}__container">
        <div class="{{$class}}__image-block">
            <div class="{{$class}}__tag {{$class}}__tag--desk">
                <span class="{{$class}}__tag-text"
                      [class.active]="tournament.isSelected"
                >{{tournament.tag | translate}}</span>
            </div>
            <img [wlc-fallback]="tournament.fallbackImagePromo"
                 [src]="tournament.image"
                 class="{{$class}}__image {{$class}}__image--desk"
                 loading="lazy">
        </div>
        <div class="{{$class}}__info">
            <img [wlc-fallback]="tournament.fallbackImagePromo"
                 [src]="tournament.image"
                 class="{{$class}}__image {{$class}}__image--mobile"
                 loading="lazy">
            <div class="{{$class}}__inner">
                <div class="{{$class}}__tag {{$class}}__tag--mobile">
                    <span class="{{$class}}__tag-text"
                          [class.active]="tournament.isSelected"
                    >{{tournament.tag | translate}}</span>
                </div>
                <h3 class="{{$class}}__title">{{tournament.name}}</h3>
                <div class="{{$class}}__description" [wlc-clamp]="$params.descriptionClamp">
                    {{tournament.descriptionClean}}
                </div>
            </div>
        </div>
        <div class="{{$class}}__board">
            <div class="{{$class}}__inner">
                <h4 class="{{$class}}__board-title">
                    {{'Prize pool' | translate}}
                    <div wlc-tournament-prizes-row
                        class="{{$class}}__prizepool"
                        [inlineParams]="{theme: 'default'}"
                        [prizes]="tournament.prizePool">
                </div>
                </h4>
                <div wlc-timer
                     class="{{$class}}-timer"
                     [value]="tournament.stateDateTournament"
                     [text]="getTimerText()"
                     (timerEnds)="updateTournaments()">
                </div>
                <div wlc-tournament-prizes
                     class="{{$class}}-prizes"
                     [themeMod]="'compact'"
                     [tournament]="tournament">
                </div>
                <div wlc-tournament-prizes
                     class="{{$class}}-prizes-mobile"
                     [tournament]="tournament">
                </div>

                <span *ngIf="tournament.winningSpreadByPercent.length > rowLimit"
                      wlc-link-block
                      link="See all prizes"
                      (click)="readMore(true)"
                ></span>
            </div>
        </div>

        <div class="buttons-wrap">
            <button
                *ngIf="!isProcessed && !isTournamentSelected && tournament.isTournamentStarts"
                wlc-button
                text="Join now"
                (click)="joinToTournament()">
            </button>
            <button
                wlc-button
                themeMod="secondary"
                [text]="'Read more'"
                (click)="readMore()">
            </button>
        </div>

        <div *ngIf="pending" class="{{$class}}__loader"></div>
    </div>
</ng-template>

<ng-template #noData>
    <div wlc-loader></div>
</ng-template>
