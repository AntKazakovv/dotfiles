<ul class="{{$class}}__ul">
    <ng-container *ngFor="let item of items">
        <li *ngIf="item.svg || item.image"
            [class]="$class + '__item' + (item.class ? ' ' + item.class : '')"
            [ngSwitch]="item.template">

            <a class="wrapper" *ngSwitchCase="'sref'"
                [uiSref]="item.sref"
                [attr.target]="item.target"
                [attr.title]="item.title">
                <ng-container
                    [ngTemplateOutlet]="!!item.svg ? itemTemplateSvg : itemTemplateImg">
                </ng-container>
            </a>

            <a class="wrapper" *ngSwitchCase="'href'"
                [attr.href]="item.href"
                [attr.target]="item.target"
                [attr.title]="item.title">
                <ng-container
                    [ngTemplateOutlet]="!!item.svg ? itemTemplateSvg : itemTemplateImg">
                </ng-container>
            </a>

            <span class="wrapper" *ngSwitchDefault
                [attr.href]="item.href"
                [attr.title]="item.title"
                [ngSwitch]="!!item.svg">
                <ng-container
                    [ngTemplateOutlet]="!!item.svg ? itemTemplateSvg : itemTemplateImg">
                </ng-container>
            </span>

            <ng-template #itemTemplateImg>
                <img class="image"
                    [attr.src]="item.image"
                    [attr.alt]="item.alt"
                    [attr.srcset]="item.image2x">
                <img class="image image--hover"
                    *ngIf="item.imageHover"
                    [attr.src]="item.imageHover"
                    [attr.alt]="item.alt"
                    [attr.srcset]="item.imageHover2x">
            </ng-template>

            <ng-template #itemTemplateSvg>
                <span class="svg" [innerHtml]="item.svg"></span>
            </ng-template>
        </li>
    </ng-container>
</ul>
