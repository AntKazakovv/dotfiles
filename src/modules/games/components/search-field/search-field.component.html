<label class="{{$class}}">
    <input class="{{$class}}__input"
           placeholder="{{$params.placeholder || 'Search' | translate}}"
           #searchField
           data-wlc-element="input_search"
           (input)="inputHandler($event)"
           (blur)="searchBlur.emit(searchQuery)"
           (keyup.enter)="onKeyUp()"
           (click)="clickEmit.emit($event)"
           [(ngModel)]="searchQuery"
    >
    <button *ngIf="showClear"
            wlc-icon
            class="{{$class}}__clear"
            [attr.aria-label]="'Clear search' | translate"
            [attr.title]="'Clear search' | translate"
            iconPath="/wlc/icons/icons_new/close.svg"
            (click)="clearSearch()"
    ></button>
    <span *ngIf="showSearch | functionPurePipe:[searchQuery, showClearIcon]"
          wlc-icon
          class="{{$class}}__icon"
          iconPath="/wlc/icons/search.svg"
    ></span>
</label>
