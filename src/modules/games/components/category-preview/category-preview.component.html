<div class="{{$class}}__wrapper">

    <div *ngFor="let category of categories" class="{{$class}}-item">

        <div class="{{$class}}-item__category category-card category-card--{{category.slug}}">
            <a class="wrapper" [wlc-link]="[category.state, category.stateParams]">
                <span class="category-card__title">{{category.name[lang] || category.name['en']}}</span>
                <span class="category-card__link">
                    {{'All games' | translate}}
                    <span wlc-icon iconPath="/wlc/icons/icons_new/arrow.svg"></span>
                </span>
            </a>
        </div>

        <div *ngIf="category.game" class="{{$class}}-item__game">
            <div wlc-sa="wlc-game-thumb"
                [wlc-sa-input-params]="{inlineParams: $params.thumbParams, game: category.game}">
            </div>
        </div>
    </div>
</div>
