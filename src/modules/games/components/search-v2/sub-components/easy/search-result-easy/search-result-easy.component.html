<div *ngIf="visibleGames.length; else emptyGames"
    class="{{$class}}__games"
    wlc-sa="wlc-games-grid"
    [wlc-sa-input-params]="{inlineParams: gamesGridParams, gameList: visibleGames}">
</div>

<div class="{{$class}}__games"
    wlc-sa="wlc-games-grid"
    [wlc-sa-input-params]="{inlineParams: secondGamesGridParams}">
</div>

<ng-template #emptyGames>
    <p *ngIf="fieldWasClicked && searchQuery.length >= 3"
        class="{{$class}}__empty"
        >{{emptyText | translate}}
    </p>
</ng-template>
