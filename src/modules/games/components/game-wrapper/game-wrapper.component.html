<div *ngIf="$params.theme == 'default'" class="{{$class}}__content container" (resized)="onResize($event)">
    <div class="{{$class}}__header" #header data-wlc-element="block_game-play-title">
        <ng-container [ngTemplateOutlet]="gameName"></ng-container>
        <div class="{{$class}}__btn-left" *ngIf="gameParams.demo" data-wlc-element="wlc-game-play-for-real">
            <button wlc-button
                    text="Play for real"
                    (click)="playForReal()">
            </button>
        </div>
        <div class="{{$class}}__btn-right">
            <div class="icon-btn">
                <div *ngIf="showDashboardBtn"
                     wlc-checkbox
                     [inlineParams]="dashboardBtn">
                </div>
            </div>
            <div *ngIf="isAuth"
                 wlc-icon
                 class="icon-btn wlc-icon--favourite"
                 [class.active]="game?.isFavourite"
                 iconPath="/wlc/icons/favourite.svg"
                 wlcElement="button_favourite"
                 (click)="toggleFavouriteBtn($event)">
            </div>
            <div wlc-icon
                 class="icon-btn"
                 iconPath="/wlc/icons/fullscreen.svg"
                 wlcElement="button_fullscreen"
                 (click)="openOnFullscreen($event)">
            </div>
            <ng-container [ngTemplateOutlet]="buttonClose"></ng-container>
        </div>
    </div>
    <div class="{{$class}}__game-area" #wrp>
        <div *ngIf="!isReady"
             wlc-loader
             class="{{$class}}__preloader">
        </div>

        <div wlc-game-dashboard [opened]="openDashboard"></div>

        <div *ngIf="game.merchantID === 990" class="{{$class}}__game-header">
            <ng-container [ngTemplateOutlet]="gameName"></ng-container>
            <ng-container [ngTemplateOutlet]="buttonClose"></ng-container>
        </div>

        <ng-container [ngTemplateOutlet]="gameWrapper"></ng-container>
    </div>
    <div class="{{$class}}__footer" #footer></div>
</div>

<div *ngIf="$params.theme == 'fullscreen-game-frame'" class="{{$class}}__content" (resized)="onResize($event)">
    <div class="{{$class}}__game-area" #wrp>
        <div *ngIf="!isReady" wlc-loader class="{{$class}}__preloader" >
        </div>
        <ng-container [ngTemplateOutlet]="gameWrapper"></ng-container>
    </div>
</div>

<ng-template #gameWrapper>
    <ng-container *ngIf="isReady">
        <ng-container *ngIf="useMobileIframe; else gameWithHtml">
            <div #gameContainer
                 id="egamings_container"
                 class="{{$class}}__game-container {{$class}}__game-container-{{game.merchantName}}"
                 [class.mobile]="mobileGame">
            </div>
        </ng-container>
    </ng-container>
</ng-template>

<ng-template #gameWithHtml>
    <div *ngIf="isReady;"
         wlc-dynamic-html
         #gameContainer
         class="{{$class}}__game-container {{$class}}__game-container-{{game.merchantName}}"
         [class.mobile]="mobileGame"
         [html]="gameHtml"
         [canUseScriptTag]="true"
         (htmlRendered)="onGameHtmlRendered()">
    </div>
</ng-template>

<ng-template #gameName>
    <h2>{{game?.name[locale] || game?.name['en'] || ''}}</h2>
</ng-template>

<ng-template #buttonClose>
    <div wlc-icon
         class="icon-btn"
         iconPath="/wlc/icons/close.svg"
         wlcElement="button_close"
         (click)="closeGame()">
    </div>
</ng-template>
