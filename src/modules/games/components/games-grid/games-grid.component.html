<div class="{{$class}}__content" [hidden]="hideSearchBlock">
    <div class="{{$class}}__header" *ngIf="$params.showTitle || $params.showAllLink?.use">

        <span *ngIf="$params.titleIcon?.name" wlc-icon [iconPath]="$params.titleIcon?.name"></span>
        <div *ngIf="$params.showTitle" wlc-title [mainText]="title"></div>

        <a *ngIf="$params.showAllLink?.use && isDesktop"
           uiSref="{{$params.showAllLink?.link}}"
           [uiParams]="$params.showAllLink?.params || {}"
           class="{{$class}}__link">
            {{$params.showAllLink?.text || 'Show all' | translate}}
            <ng-container *ngIf="$params.showAllLink.useCounter && filteredGames?.length">({{filteredGames.length}})</ng-container>
            <span wlc-icon iconName="arrow"></span>
        </a>
    </div>

    <ng-container *ngIf="isReady; else : preloader">
        <div *ngIf="filteredGames?.length; else: noGames"
             [@appearance]="filteredGames.length"
             class="{{$class}}__list"
             (resized)="onResize($event)">

            <div class="{{$class}}__item" *ngFor="let game of filteredGames | slice: 0:gamesCount">
                <div wlc-game-thumb [game]="game"></div>
            </div>
            <ng-container *ngIf="$params.usePlaceholders && !filteredGames.length">
                <div class="{{$class}}__item"
                     *ngFor="let item of placeHolders">
                    <div class="{{$class}}__placeholder" [ngStyle]="placeHolderStyles">
                        <!-- TODO: add loader -->
                        <span *ngIf="$params.moreBtn.lazy && !lazyReady">Loading...</span>
                    </div>
                </div>
            </ng-container>
        </div>
        <div class="{{$class}}__more"
             *ngIf="gamesCount < filteredGames?.length">
            <button wlc-button
                    [wlcElement]="'button_load-more-games'"
                    [text]="'Load more games'"
                    *ngIf="!hideShowMoreBtn && !$params.showAllLink?.use && !useLazy"
                    (click)="loadMore()"></button>
            <button *ngIf="$params.showAllLink?.use && !isDesktop"
                    wlc-button
                    [text]="$params.showAllLink?.text || 'Show all'"
                    uiSref="{{$params.showAllLink?.link}}"
                    [uiParams]="$params.showAllLink?.params || {}">
            </button>
        </div>

    </ng-container>

    <ng-template #noGames>
        <div class="{{$class}}__nocontent" @appearance>{{'No games available' | translate}}</div>
    </ng-template>

    <ng-template #preloader>
        <div wlc-loader class="{{$class}}__preloader">
        </div>
    </ng-template>
</div>
