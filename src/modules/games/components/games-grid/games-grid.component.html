<div class="{{$class}}__content" [hidden]="hideSearchBlock">
    <div *ngIf="showDefaultHeader" class="{{$class}}__header">

        <span *ngIf="$params.titleIcon?.name" wlc-icon [iconPath]="$params.titleIcon.name"></span>
        <div *ngIf="$params.showTitle" wlc-title [mainText]="title"></div>

        <a *ngIf="$params.showAllLink.use && isDesktop"
           class="{{$class}}__link"
           uiSref="{{$params.showAllLink.link}}"
           [uiParams]="$params.showAllLink.params || {}">
            {{$params.showAllLink.text | translate}}
            <ng-container *ngIf="$params.showAllLink.useCounter && filteredGames?.length">({{filteredGames.length}})
            </ng-container>
            <span wlc-icon iconName="arrow"></span>
        </a>
    </div>

    <ng-container *ngIf="isReady; else : preloader">
        <div *ngIf="filteredGames?.length; else: noGames"
             #gameList
             class="{{$class}}__list"
             (resized)="onResize($event)">

            <ng-container *ngIf="$params.themeMod === 'header-inline'">
                <div *ngIf="isDesktop" 
                     class="{{$class}}__header">

                    <span *ngIf="$params.titleIcon?.name"
                          wlc-icon
                          [iconPath]="$params.titleIcon.name"></span>
                    <div *ngIf="$params.showTitle" 
                         wlc-title
                         [mainText]="title"></div>

                    <a *ngIf="$params.showAllLink.use"
                        class="{{$class}}__link"
                        uiSref="{{$params.showAllLink?.link}}"
                        [uiParams]="$params.showAllLink.params || {}">
                        {{$params.showAllLink.text | translate}}
                        <ng-container *ngIf="$params.showAllLink.useCounter && filteredGames?.length">({{filteredGames.length}})
                        </ng-container>
                        <span wlc-icon iconName="arrow"></span>
                    </a>
                </div>

                <a *ngIf="!isDesktop" 
                    class="{{$class}}__header"
                    uiSref="{{$params.showAllLink?.link}}"
                    [uiParams]="$params.showAllLink.params || {}">

                    <span *ngIf="$params.titleIcon?.name"
                          wlc-icon
                          [iconPath]="$params.titleIcon.name"></span>
                    <span *ngIf="$params.showTitle"
                          wlc-title
                          [mainText]="title"></span>
                </a>
            </ng-container>

            <div *ngIf="$params.bannerSettings"
                 [@appearance]
                 #gameBanner
                 class="{{$class}}__banner wlc-games-banner">
                <div wlc-banners-slider
                     [inlineParams]="$params.bannerSettings"></div>
            </div>

            <div *ngFor="let game of filteredGames | slice: 0:gamesCount; trackBy: trackGames"
                 #gameItem
                 class="{{$class}}__item">
                <div wlc-game-thumb
                     [@appearance]
                     [game]="game"
                     [inlineParams]="$params.thumbParams"></div>
            </div>
            <ng-container *ngIf="$params.usePlaceholders && !filteredGames?.length">
                <div class="{{$class}}__item"
                     *ngFor="let item of placeHolders">
                    <div class="{{$class}}__placeholder" [ngStyle]="placeHolderStyles">
                        <span *ngIf="$params.moreBtn.lazy && !lazyReady">Loading...</span>
                    </div>
                </div>
            </ng-container>
        </div>

        <div *ngIf="$params.showProgressBar && gamesCount < filteredGames?.length"
             wlc-progress-bar
             class="{{$class}}__progressbar"
             [maxValue]="filteredGames.length"
             [currentValue]="gamesCount">
        </div>

        <div *ngIf="gamesCount < filteredGames?.length"
             class="{{$class}}__more">
            <button *ngIf="!hideShowMoreBtn && !$params.showAllLink.use && !useLazy"
                    wlc-button
                    [wlcElement]="'button_load-more-games'"
                    [text]="'Load more games'"
                    (click)="loadMore()"></button>
            <button *ngIf="$params.showAllLink.use && !isDesktop"
                    wlc-button
                    [text]="$params.showAllLink.text"
                    uiSref="{{$params.showAllLink.link}}"
                    [uiParams]="$params.showAllLink.params || {}">
            </button>
        </div>

    </ng-container>

    <ng-template #noGames>
        <div class="{{$class}}__nocontent" @appearance>{{'No games available' | translate}}</div>
    </ng-template>

    <ng-template #preloader>
        <div wlc-loader class="{{$class}}__preloader">
        </div>
    </ng-template>
</div>
