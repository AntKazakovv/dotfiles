<div class="{{$class}}__wrapper">
    <div class="{{$class}}__title">
        {{$params.title | translate}}
    </div>
    <div class="{{$class}}__games"
        wlc-sa="wlc-games-grid"
        [wlc-sa-input-params]="{inlineParams: $params.gamesGridParams}">

    <div wlc-checkbox
         class="{{$class}}__dont-show"
         [inlineParams]="dontShowAgainBtn">
    </div>
</div>
