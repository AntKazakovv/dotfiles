<ng-container *ngIf="inited && !dumpy; else preloader">
    <ng-container [ngSwitch]="$params.type">
        <ng-container [ngTemplateOutlet]="typeVertical" *ngSwitchCase="'vertical'"></ng-container>
        <ng-container [ngTemplateOutlet]="typeModal" *ngSwitchCase="'modal'"></ng-container>
        <ng-container [ngTemplateOutlet]="typePromoWidget" *ngSwitchCase="'promo-widget'"></ng-container>
        <ng-container [ngTemplateOutlet]="typeDefault" *ngSwitchDefault></ng-container>
    </ng-container>
</ng-container>

<ng-template #typePromoWidget>
    <div *ngIf="!initFailed" class="{{$class}}__content">
        <picture class="{{$class}}__img"
                 data-wlc-element="block_game-thumb-img">
            <source [srcset]="game.getImage(640, 'webp')" type="image/webp">
            <img [wlc-fallback]="game.getImage(640)" [src]="game.getImage(640)" loading="lazy">
        </picture>
        <div *ngIf="promoWidgetTitle" class="{{$class}}__title">
            {{promoWidgetTitle | translate}}
        </div>
        <div class="{{$class}}__buttons">
            <button wlc-button
                    class="wlc-btn wlc-btn--play"
                    wlcElement="button_game-play"
                    [icon]="'wlc-game-play'"
                    [text]="'Play'"
                    (click)="startGame(false, false, $event)"
            ></button>
            <button
                    *ngIf="game.hasDemo"
                    wlc-button
                    wlcElement="button_game-demo"
                    [text]="'Demo'"
                    (click)="startGame(true, false, $event)"
                    class="wlc-btn wlc-btn--demo wlc-btn--theme-mod-secondary"
            ></button>
        </div>
    </div>
    <div *ngIf="initFailed" class="{{$class}}__error">
        {{'Game load error' | translate}}
    </div>
</ng-template>

<ng-template #typeModal>
    <picture class="{{$class}}__img"
             data-wlc-element="block_game-thumb-img">
        <source [srcset]="game.getImage(315, 'webp')" type="image/webp">
        <img [wlc-fallback]="game.getImage(315)" [src]="game.getImage(315)" loading="lazy">
    </picture>
    <ng-container [ngTemplateOutlet]="buttonFavourite"></ng-container>
</ng-template>

<ng-template #typeVertical>
    <div class="{{$class}}-media"
         (click)="startGame(false, true, $event)"
    >
        <ng-container *ngIf="!hasVideo; else videoTemplate">
            <picture class="{{$class}}-media__bg"
                     data-wlc-element="block_game-thumb-media">

                <ng-container *ngFor="let image of $any(getVerticalContent('background', ['webp']))">
                    <source [srcset]="image.src" [type]="image.type">
                </ng-container>

                <img wlc-fallback [src]="getVerticalContent('background', 'jpg')" loading="lazy">
            </picture>

            <picture class="{{$class}}-media__fg"
                     data-wlc-element="block_game-thumb-media">

                <ng-container *ngFor="let image of $any(getVerticalContent('foreground', ['webp']))">
                    <source [srcset]="image.src" [type]="image.type">
                </ng-container>

                <img wlc-fallback [src]="getVerticalContent('foreground', 'png')" loading="lazy">
            </picture>

            <picture class="{{$class}}-media__logo"
                     data-wlc-element="block_game-thumb-media">

                <ng-container *ngFor="let image of $any(getVerticalContent('logo', ['webp']))">
                    <source [srcset]="image.src" [type]="image.type">
                </ng-container>

                <img wlc-fallback [src]="getVerticalContent('logo', 'png')" loading="lazy">
            </picture>
        </ng-container>

        <ng-template #videoTemplate>
            <video autoplay playsinline muted loop class="{{$class}}-media__video" #video>

                <ng-container *ngFor="let video of $any(getVerticalContent('video', ['av1.mp4', 'hevc.mp4', 'h264.mp4']))">
                    <source [src]="video.src" [type]="video.type">
                </ng-container>
            </video>
        </ng-template>
    </div>
    <div class="{{$class}}__control">
        <ng-container [ngTemplateOutlet]="buttonsPlayDemo"></ng-container>
    </div>
    <ng-container [ngTemplateOutlet]="buttonFavourite"></ng-container>
</ng-template>

<ng-template #typeDefault>
    <ng-container [ngTemplateOutlet]="thumbImg"></ng-container>
    <div class="{{$class}}__desc">
        <div class="{{$class}}__title">
            <ng-container [ngTemplateOutlet]="thumbName"></ng-container>
            <span *ngIf="$params?.common?.useMerchantName"
                  class="{{$class}}__merchant"
                  data-wlc-element="block_game-thumb-alias">
                {{game.merchantAlias}}
            </span>
        </div>
        <ng-container [ngTemplateOutlet]="buttonFavourite"></ng-container>
        <ng-container [ngTemplateOutlet]="buttonsPlayDemo"></ng-container>
    </div>
    <ng-container
        *ngIf="hasPragmaticDGA"
        [ngTemplateOutlet]="pragmaticPlayLive">
    </ng-container>
</ng-template>

<ng-template #thumbImg>
    <picture class="{{$class}}__img"
             data-wlc-element="block_game-thumb-img"
             (click)="startGame(false, true, $event)">
        <source [srcset]="game.getImage(315, 'webp')" type="image/webp">
        <img [wlc-fallback]="game.getImage(315)" [src]="game.getImage(315)" loading="lazy">
    </picture>
</ng-template>

<ng-template #buttonFavourite>
    <div *ngIf="isAuth"
          wlc-icon
          class="{{$class}}__icon"
          [wlcElement]="'button_favourite'"
          [iconPath]="'/wlc/icons/favourite.svg'"
          [ngClass]="{'active': game.isFavourite}"
          (click)="toggleFavourites(game)">
    </div>
</ng-template>

<ng-template #buttonsPlayDemo>
    <div class="{{$class}}__buttons" [ngClass]="{'no-demo': !game.hasDemo}">
        <button wlc-button
                class="wlc-btn wlc-btn--play"
                wlcElement="button_game-play"
                [icon]="'wlc-game-play'"
                [text]="'Play'"
                [theme]="gameThumbSettings.theme"
                [themeMod]="gameThumbSettings.themeMode"
                (click)="startGame(false, false, $event)"
        ></button>
        <button *ngIf="game.hasDemo"
                wlc-button
                class="wlc-btn wlc-btn--demo"
                wlcElement="button_game-demo"
                [text]="'Demo'"
                [theme]="gameThumbSettings.theme"
                [themeMod]="gameThumbSettings.demoThemeMode"
                (click)="startGame(true, false, $event)"
        ></button>
    </div>
</ng-template>

<ng-template #thumbName>
    <span class="{{$class}}__name"
          data-wlc-element="block_game-thumb-name"
          title="{{game.name.en}}">
        {{game.name.en | truncate: 25}}
    </span>
</ng-template>

<ng-template #preloader>
    <!-- TODO: do special preloader -->
    <div class="{{$class}}__loader">
        <div wlc-loader></div>
    </div>
</ng-template>

<ng-template #pragmaticPlayLive>
    <div class="{{$class}}__ppl-limits">
        <span wlc-currency
              [value]="pragmaticDGA.minBet"
              [currency]="pragmaticDGA.currency">
        </span> -
        <span wlc-currency
              [value]="pragmaticDGA.maxBet"
              [currency]="pragmaticDGA.currency">
        </span>
    </div>

    <div class="{{$class}}__ppl"
         (click)="startGame(false, true, $event)">

        <div *ngIf="pragmaticDGA.lastResult?.length"
             class="{{$class}}__ppl-results" >
            <div *ngFor="let item of pragmaticDGA.lastResult"
                 class="{{$class}}__ppl-results-item {{$class}}__ppl-results-item--{{item.type}}">
                {{item.value}}
            </div>
        </div>

        <div class="{{$class}}__ppl-info"
             [ngClass]="[pragmaticDGA.freePlaces ? '' : $class + '__ppl-info--no-available-place']">

            <div *ngIf="pragmaticDGA.freePlaces"
                 class="{{$class}}__ppl-info-item">
                <div wlc-icon
                    [iconPath]="'/wlc/icons/pragmaticplaylive/places.svg'"
                ></div>
                <div class="{{$class}}__ppl-info-text">
                    {{pragmaticDGA.freeFromPlaces}}
                </div>
            </div>

            <div class="{{$class}}__ppl-info-item">
                <div wlc-icon
                    [iconPath]="'/wlc/icons/pragmaticplaylive/dealer.svg'"
                ></div>
                <div class="{{$class}}__ppl-info-text">
                    {{pragmaticDGA.dealer}}
                </div>
            </div>
        </div>
    </div>
</ng-template>
