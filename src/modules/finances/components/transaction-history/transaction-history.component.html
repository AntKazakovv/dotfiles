<div class="{{$class}}-filter">
    <div wlc-datepicker [inlineParams]='startDateInput'></div>
    <div wlc-datepicker [inlineParams]='endDateInput'></div>

    <div wlc-select [inlineParams]='filterSelect' *ngIf="$params.filterType==='select'; else buttons"></div>
</div>

<div *ngIf="ready; else preloader" class="{{$class}}">
    <div wlc-table [inlineParams]='tableData'></div>
</div>

<ng-template #buttons>
    <button wlc-button (click)="setFilter('all')" text="All" [wlcElement]="'button_all'"></button>
    <button wlc-button (click)="setFilter('deposit')" text="Deposit" [wlcElement]="'button_deposit'"></button>
    <button wlc-button (click)="setFilter('withdraw')" text="Withdraw" [wlcElement]="'button_withdraw'"></button>
</ng-template>

<ng-template #preloader>
    <div wlc-loader></div>
</ng-template>
