<ng-container *ngIf="ready; else preloader" [ngSwitch]="$params.theme">

    <div
        *ngIf="showAlert('title')"
        wlc-alert
        class="{{$class}}__alert-title"
        [title]="alertInformation['title'].title | translate"
        [text]="alertInformation['title'].description | translate"
        [level]="alertInformation['title'].mod"></div>

    <ng-container *ngSwitchCase="'second'" [ngTemplateOutlet]="second"></ng-container>
    <ng-container *ngSwitchDefault [ngTemplateOutlet]="default"></ng-container>
</ng-container>

<ng-template #preloader>
    <div wlc-loader></div>
</ng-template>

<ng-template #second>
    <div class="{{$class}}__grid">
        <div #depLeft class="{{$class}}__grid-left">
            <div *ngIf="isMultiWallet" class="{{$class}}__step {{$class}}__step--wallet">
                <p class="{{$class}}__step-title">{{'Choose a wallet' | translate}}</p>
                <ng-container [ngTemplateOutlet]="wallets"></ng-container>
            </div>
            <div class="{{$class}}__step {{$class}}__step--paysystems">
                <p class="{{$class}}__step-title">{{'Select a payment method' | translate}}</p>
                <ng-container [ngTemplateOutlet]="systems"></ng-container>
            </div>
        </div>
        <div #depRight class="{{$class}}__grid-right">
            <div *ngIf="isCryptoInvoices" class="{{$class}}__step {{$class}}__step--cryptoinvoices">
                <p class="{{$class}}__step-title">{{'Select a cryptocurrency' | translate}}</p>
                <ng-container [ngTemplateOutlet]="cryptoInvoiceSystems"></ng-container>
            </div>
            <div *ngIf="bonusesExist && showBonuses" class="{{$class}}__step {{$class}}__step--bonuses">
                <p class="{{$class}}__step-title">{{'Select a bonus' | translate}}</p>
                <ng-container [ngTemplateOutlet]="bonuses"></ng-container>

                <div *ngIf="useDepositPromoCode" class="{{$class}}__promocode">
                    <div wlc-deposit-promocode
                        [inlineParams]="$params.depositPromoCodeParams"
                        (promoCodeAppliedEvent)="onPromoCodeChanged($event)"></div>
                </div>
            </div>
            <div class="{{$class}}__step {{$class}}__step--paymentinfo">
                <p class="{{$class}}__step-title">{{'Payment information' | translate}}</p>
                <ng-container [ngTemplateOutlet]="paymentInfo"></ng-container>
            </div>
        </div>
    </div>
</ng-template>

<ng-template #default>
    <ng-container *ngFor="let step of steps; index as $index">
        <ng-container [ngTemplateOutlet]="stepTpl"
            [ngTemplateOutletContext]="{$implicit: step, index: $index}"></ng-container>
    </ng-container>
</ng-template>

<ng-template #stepTpl let-step let-index="index">
    <div class="{{$class}}__step {{$class}}__step--{{index + 1}}">
        <div class="{{$class}}__subtitle">
            <div class="{{$class}}__subtitle-name {{$class}}__{{step.template}}"><span>{{index + 1}}
                    .</span> {{step.title | translate}}</div>
        </div>

        <ng-container [ngSwitch]="step.template">
            <ng-container *ngSwitchCase="'wallets'" [ngTemplateOutlet]="wallets"></ng-container>
            <ng-container *ngSwitchCase="'systems'" [ngTemplateOutlet]="systems"></ng-container>
            <ng-container *ngSwitchCase="'paymentInfo'" [ngTemplateOutlet]="paymentInfo"></ng-container>
            <ng-container *ngSwitchCase="'bonuses'" [ngTemplateOutlet]="bonuses"></ng-container>
            <ng-container *ngSwitchCase="'cryptoInvoiceSystems'"
                [ngTemplateOutlet]="cryptoInvoiceSystems"></ng-container>
            <ng-container *ngSwitchDefault [ngTemplateOutlet]="empty"></ng-container>
        </ng-container>

    </div>
</ng-template>

<ng-template #wallets>
    <div
        *ngIf="showAlert('wallets')"
        wlc-alert
        class="{{$class}}__alert"
        [title]="alertInformation['wallets'].title | translate"
        [text]="alertInformation['wallets'].description | translate"
        [level]="alertInformation['wallets'].mod"></div>
    <div wlc-wallets
         class="{{$class}}__wallets"
         [inlineParams]="walletsParams"
         (changeWalletEmit)="onWalletChange($event)"></div>
    <div *ngIf="showDividerInPaymentSystems" class="{{$class}}__divider"></div>
</ng-template>

<ng-template #systems>
    <div
        *ngIf="showAlert('systems')"
        wlc-alert
        class="{{$class}}__alert"
        [title]="alertInformation['systems'].title | translate"
        [text]="alertInformation['systems'].description | translate"
        [level]="alertInformation['systems'].mod"></div>
    <div
        wlc-payment-list
        data-wlc-element="block_payment-list"
        [isFetchingSystems]="isFetchingSystems"
        [lastSucceedMethod]="lastSucceedPaymentMethod"
        [inlineParams]="listConfig"
        [availableSystems]="availableSystems"
        [userCountry]="userCountry"
        [currentSystem]="parentSystem || currentSystem" [parentTheme]="$params.theme">
    </div>
    <div *ngIf="showDividerInPaymentSystems" class="{{$class}}__divider"></div>
</ng-template>

<ng-template #bonuses>
    <div
        *ngIf="showAlert('bonuses')"
        wlc-alert
        class="{{$class}}__alert"
        [title]="alertInformation['bonuses'].title | translate"
        [text]="alertInformation['bonuses'].description | translate"
        [level]="alertInformation['bonuses'].mod"></div>
    <div wlc-wrapper
         [inlineParams]="bonusesListParams">
    </div>
    <div class="{{$class}}__divider"></div>
</ng-template>

<ng-template #cryptoInvoiceSystems>
    <div
        *ngIf="showAlert('cryptoInvoiceSystems')"
        wlc-alert
        class="{{$class}}__alert"
        [title]="alertInformation['cryptoInvoiceSystems'].title | translate"
        [text]="alertInformation['cryptoInvoiceSystems'].description | translate"
        [level]="alertInformation['cryptoInvoiceSystems'].mod"></div>
    <div class="{{$class}}__crypto-list"
         wlc-payment-list
         [lastSucceedMethod]="lastSucceedPaymentMethod"
         [currentSystem]="currentSystem"
         [inlineParams]="cryptoListConfig"
         [availableSystems]="availableSystems"></div>
    <div *ngIf="currentSystem" class="{{$class}}__divider"></div>
</ng-template>

<ng-template #paymentInfo>
    <div
        *ngIf="showAlert('paymentInfo')"
        wlc-alert
        class="{{$class}}__alert"
        [title]="alertInformation['paymentInfo'].title | translate"
        [text]="alertInformation['paymentInfo'].description | translate"
        [level]="alertInformation['paymentInfo'].mod"></div>
    <div wlc-payment-form
        [mode]="$params.mode"
        [currentSystem]="currentSystem"
        [bonus]="currentBonus"
        [wallet]="selectedWallet"></div>

    <ng-container *ngIf="isWaitingResponse">
        <div wlc-loader></div>
    </ng-container>
</ng-template>
<ng-template #empty>The step not implemented</ng-template>
