<button *ngFor="let amount of $params.amounts"
    class={{$class}}__amount-item
    type="button"
    (click)="setAmount(amount)">
    <span *ngIf="!$params.summationMode else summationMode"
        wlc-currency
        [currency]="$params.currency"
        [value]="amount"
        [digitsInfo]="'1-0-0'">
    </span>
    <ng-template #summationMode>
        <span>
            +{{amount}}
        </span>
    </ng-template>
</button>
