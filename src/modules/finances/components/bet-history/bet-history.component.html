<ng-container *ngIf="ready; else preloader">
    <div *ngIf="showFilter" class="{{$class}}__filter">
        <div wlc-datepicker [inlineParams]="startDateInput"></div>
        <div wlc-datepicker [inlineParams]="endDateInput"></div>
        <div wlc-select [inlineParams]="filterSelect"></div>
    </div>
    
    <div class="{{$class}}__table">
        <div wlc-table [inlineParams]="tableData"></div>
    </div>
</ng-container>

<ng-template #preloader>
    <div wlc-loader></div>
</ng-template>
