<div *ngIf="ready; else preloader" class="{{$class}}">
    <div *ngIf="levels.value.length; else empty"
         wlc-table
         [inlineParams]='tableData'></div>
</div>

<ng-template #empty>
    <div wlc-wrapper [inlineParams]="$params.emptyConfig"></div>
</ng-template>

<ng-template #preloader>
    <div wlc-loader></div>
</ng-template>
