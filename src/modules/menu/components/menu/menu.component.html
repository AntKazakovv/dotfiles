<ng-template #sref let-item="item">

    <ng-container *ngIf="!item.params?.state?.parent; else srefWithParent">
        <div class="{{$class}}__item {{$class}}__item--sref">

            <a class="{{$class}}__link"
               *ngIf="item.params?.state?.activeEq"
               [uiSref]="item.params?.state?.name"
               [uiParams]="item.params?.state?.params"
               [uiOptions]="item.params?.state?.options"
               [attr.data-wlc-element]="item.wlcElement"
               uiSrefActiveEq="active">

               <span class="{{$class}}__icon" *ngIf="item.icon" wlc-icon [iconPath]="getIcon(item)" [fallback]="iconsFallback"></span>
               {{item.name | translate}} <span *ngIf="item?.counter" wlc-counter [counterType]="item?.counter"></span></a>

            <a class="{{$class}}__link"
               *ngIf="!item.params?.state?.activeEq"
               [uiSref]="item.params?.state?.name"
               [uiParams]="item.params?.state?.params"
               [uiOptions]="item.params?.state?.options"
               [attr.data-wlc-element]="item.wlcElement"
               uiSrefActive="active">

               <span class="{{$class}}__icon" wlc-icon [iconPath]="getIcon(item)" [fallback]="iconsFallback"></span>
               <span>{{item.name | translate}} <span *ngIf="item?.counter" wlc-counter [counterType]="item?.counter"></span></span>
            </a>
        </div>
    </ng-container>

    <ng-container #srefWithParent *ngIf="item.params?.state?.parent">
        <div class="{{$class}}__item {{$class}}__item--sref">
            <span class="{{$class}}__icon" *ngIf="item.icon" wlc-icon [iconPath]="getIcon(item)" [fallback]="iconsFallback">
            </span>
            <a class="{{$class}}__link"
               [uiSref]="item.params?.state?.name"
               [uiParams]="item.params?.state?.params"
               [uiOptions]="item.params?.state?.options"
               [attr.data-wlc-element]="item.wlcElement"
               [class.active]="isActive(item.params?.state?.parent)">
                {{item.name | translate}}
                <span *ngIf="item?.counter" wlc-counter [counterType]="item?.counter"></span>
            </a>
        </div>
    </ng-container>

</ng-template>

<ng-template #href let-item="item">
    <div class="{{$class}}__item {{$class}}__item--href">
        <a class="{{$class}}__link"
           [target]="item?.params?.target || '_self'"
           [href]="item?.params?.href"
        >{{item.name | translate}}</a>
    </div>
</ng-template>

<ng-template #anchor let-item="item">
    <div class="{{$class}}__item {{$class}}__item--anchor">
        <span class="{{$class}}__icon" *ngIf="item.icon" wlc-icon [iconPath]="getIcon(item)" [fallback]="iconsFallback">
        </span>
        <a class="{{$class}}__link"
           href="#{{item.params.anchor?.name}}"
        >{{item?.name | translate}}</a>
    </div>
</ng-template>

<ng-template #scroll let-item="item">
    <div class="{{$class}}__item {{$class}}__item--anchor">
        <a class="{{$class}}__link"
           (click)="scrollTo(item.params.scroll)"
        >{{item?.name | translate}}</a>
    </div>
</ng-template>

<ng-template #modal let-item="item">
    <div class="{{$class}}__item {{$class}}__item--modal" (click)="showModal(item?.params?.modal?.name)">
        <span class="{{$class}}__icon" *ngIf="item.icon" wlc-icon [iconPath]="getIcon(item)" [fallback]="iconsFallback">
        </span>
        <a class="{{$class}}__link"
           (click)="openModal(item)"
        >{{item.name | translate}}</a>
    </div>
</ng-template>

<ng-template #dropdown let-item="item">
    <div class="{{$class}}__item {{$class}}__item--dropdown"
         [ngClass]="{'active': item.expand}">
        <span class="{{$class}}__icon" *ngIf="item.icon" wlc-icon [iconPath]="getIcon(item)" [fallback]="iconsFallback">
        </span>
        <a class="{{$class}}__link" (click)="toggleDropdown(item)" [attr.data-wlc-element]="item.wlcElement || item.parent.wlcElement">{{item.parent.name | translate}}
            <span class="{{$class}}__icon-arrow" wlc-icon [iconName]="'arrow'"></span>
        </a>

        <div class="{{$class}}__submenu"
             [@toggle]="item.expand ? 'opened' : 'closed'"
        >
            <ng-container *ngFor="let item of item.items" [ngSwitch]="item.type">

                <ng-container *ngSwitchCase="'anchor'" [ngTemplateOutlet]="anchor"
                              [ngTemplateOutletContext]="{item: item}">
                </ng-container>

                <ng-container *ngSwitchCase="'sref'" [ngTemplateOutlet]="sref" [ngTemplateOutletContext]="{item: item}">
                </ng-container>

                <ng-container *ngSwitchCase="'modal'" [ngTemplateOutlet]="modal"
                              [ngTemplateOutletContext]="{item: item}">
                </ng-container>

                <ng-container *ngSwitchCase="'href'" [ngTemplateOutlet]="href" [ngTemplateOutletContext]="{item: item}">
                </ng-container>

                <ng-container *ngSwitchCase="'scroll'" [ngTemplateOutlet]="scroll"
                              [ngTemplateOutletContext]="{item: item}">
                </ng-container>

                <ng-container *ngIf="item.parent" [ngTemplateOutlet]="dropdown" [ngTemplateOutletContext]="{item: item}">
                </ng-container>

            </ng-container>
        </div>
    </div>
</ng-template>

<ng-container *ngIf="$params.common?.useSwiper && slides.length">
    <div wlc-slider #slider
         [slides]="slides"
         [inlineParams]="sliderParams">
    </div>
</ng-container>

<ng-container *ngIf="!$params.common?.useSwiper">
    <ng-container *ngFor="let item of items" [ngSwitch]="item.type">

        <ng-container *ngSwitchCase="'anchor'" [ngTemplateOutlet]="anchor" [ngTemplateOutletContext]="{item: item}">
        </ng-container>

        <ng-container *ngSwitchCase="'sref'" [ngTemplateOutlet]="sref" [ngTemplateOutletContext]="{item: item}">
        </ng-container>

        <ng-container *ngSwitchCase="'title'" [ngTemplateOutlet]="sref" [ngTemplateOutletContext]="{item: item}">
        </ng-container>

        <ng-container *ngSwitchCase="'modal'" [ngTemplateOutlet]="modal" [ngTemplateOutletContext]="{item: item}">
        </ng-container>

        <ng-container *ngSwitchCase="'href'" [ngTemplateOutlet]="href" [ngTemplateOutletContext]="{item: item}">
        </ng-container>

        <ng-container *ngSwitchCase="'scroll'" [ngTemplateOutlet]="scroll" [ngTemplateOutletContext]="{item: item}">
        </ng-container>

        <ng-container *ngIf="item.parent" [ngTemplateOutlet]="dropdown" [ngTemplateOutletContext]="{item: item}">
        </ng-container>

    </ng-container>
</ng-container>
