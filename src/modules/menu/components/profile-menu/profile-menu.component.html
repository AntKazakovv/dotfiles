<div *ngIf="ready$ | async" class="{{$class}}__content">
    <div wlc-menu [inlineParams]="menuParams"></div>
    <ng-container *ngIf="useSliderNavigation">
        <div [hidden]="!showSliderNavigation" class="{{$class}}__controls">
            <button class="{{$class}}__control {{$class}}__control--prev">
                <span wlc-icon iconPath="/wlc/icons/icons_new/arrow.svg"></span>
            </button>
            <button class="{{$class}}__control {{$class}}__control--next">
                <span wlc-icon iconPath="/wlc/icons/icons_new/arrow.svg"></span>
            </button>
        </div>
    </ng-container>
</div>
