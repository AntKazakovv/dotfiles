<ng-container *ngIf="bonus.showOnly; else themeSwitcher">
    <ng-container *ngIf="isShowReadMoreBtn" [ngTemplateOutlet]="readMoreBtn"></ng-container>
    <ng-container [ngTemplateOutlet]="closeBtn"></ng-container>
</ng-container>

<ng-template #themeSwitcher>
    <ng-container [ngSwitch]="bonusItemTheme">
        <ng-container *ngSwitchCase="'promo'" [ngTemplateOutlet]="promo"></ng-container>
        <ng-container *ngSwitchCase="'promo-home'" [ngTemplateOutlet]="promo"></ng-container>
        <ng-container *ngSwitchCase="'long'" [ngTemplateOutlet]="long"></ng-container>
        <ng-container *ngSwitchCase="'modal'" [ngTemplateOutlet]="modal"></ng-container>
        <ng-container *ngSwitchCase="'wolf'" [ngTemplateOutlet]="wolf"></ng-container>
        <ng-container *ngSwitchDefault [ngTemplateOutlet]="default"></ng-container>
    </ng-container>
</ng-template>

<ng-template #default>
    <ng-container *ngIf="isAuth">
        <ng-container [ngTemplateOutlet]="subscribeBtn"></ng-container>
        <ng-container [ngTemplateOutlet]="takeBtn"></ng-container>
        <ng-container [ngTemplateOutlet]="openLootboxBtn"></ng-container>
        <ng-container [ngTemplateOutlet]="unsubscribeBtn"></ng-container>
        <ng-container [ngTemplateOutlet]="leaveBtn"></ng-container>
        <ng-container [ngTemplateOutlet]="chooseBonusBtn"></ng-container>
        <ng-container *ngIf="isShowReadMoreBtn" [ngTemplateOutlet]="readMoreBtn"></ng-container>
        <ng-container [ngTemplateOutlet]="closeBtn"></ng-container>
    </ng-container>
    <ng-container *ngIf="$params.useActionButtons" [ngTemplateOutlet]="actionRegisterBtn"></ng-container>
</ng-template>

<ng-template #promo>
    <ng-container *ngIf="isAuth">
        <ng-container [ngTemplateOutlet]="subscribeBtn"></ng-container>
        <ng-container [ngTemplateOutlet]="takeBtn"></ng-container>
        <ng-container [ngTemplateOutlet]="openLootboxBtn"></ng-container>
        <ng-container *ngIf="$params.useActionButtons">
            <ng-container [ngTemplateOutlet]="actionDepositBtn"></ng-container>
            <ng-container [ngTemplateOutlet]="actionPlayBtn"></ng-container>
        </ng-container>
        <ng-container [ngTemplateOutlet]="closeBtn"></ng-container>
    </ng-container>
    <ng-container *ngIf="$params.useActionButtons" [ngTemplateOutlet]="actionRegisterBtn"></ng-container>
    <ng-container *ngIf="isShowReadMoreBtn" [ngTemplateOutlet]="readMoreBtn"></ng-container>
</ng-template>

<ng-template #long>
    <ng-container *ngIf="isAuth">
        <ng-container [ngTemplateOutlet]="chooseBonusBtn"></ng-container>
        <ng-container *ngIf="!bonus.isActive">
            <ng-container [ngTemplateOutlet]="subscribeBtn"></ng-container>
            <ng-container [ngTemplateOutlet]="takeBtn"></ng-container>
            <ng-container [ngTemplateOutlet]="openLootboxBtn"></ng-container>
            <ng-container [ngTemplateOutlet]="unsubscribeBtn"></ng-container>
        </ng-container>
        <ng-container [ngTemplateOutlet]="closeBtn"></ng-container>
    </ng-container>
    <ng-container [ngTemplateOutlet]="registrationBtn"></ng-container>
</ng-template>

<ng-template #modal>
    <ng-container *ngIf="isAuth">
        <ng-container [ngTemplateOutlet]="subscribeBtn"></ng-container>
        <ng-container [ngTemplateOutlet]="takeBtn"></ng-container>
        <ng-container [ngTemplateOutlet]="openLootboxBtn"></ng-container>
        <ng-container *ngIf="$params.useActionButtons">
            <ng-container [ngTemplateOutlet]="actionDepositBtn"></ng-container>
            <ng-container [ngTemplateOutlet]="actionPlayBtn"></ng-container>
        </ng-container>
        <ng-container [ngTemplateOutlet]="unsubscribeBtn"></ng-container>
        <ng-container [ngTemplateOutlet]="leaveBtn"></ng-container>
    </ng-container>
    <ng-container *ngIf="$params.useActionButtons" [ngTemplateOutlet]="actionRegisterBtn"></ng-container>
</ng-template>

<ng-template #wolf>
    <ng-container *ngIf="isAuth">
        <ng-container [ngTemplateOutlet]="subscribeBtn"></ng-container>
        <ng-container [ngTemplateOutlet]="takeBtn"></ng-container>
        <ng-container [ngTemplateOutlet]="openLootboxBtn"></ng-container>
        <ng-container *ngIf="$params.useActionButtons">
            <ng-container [ngTemplateOutlet]="actionDepositBtn"></ng-container>
            <ng-container [ngTemplateOutlet]="actionPlayBtn"></ng-container>
        </ng-container>
    </ng-container>
    <ng-container *ngIf="$params.useActionButtons" [ngTemplateOutlet]="actionRegisterBtn"></ng-container>
</ng-template>

<ng-template #subscribeBtn>
    <button *ngIf="bonus.canSubscribe"
            wlc-button
            [attr.data-wlc-element]="$params.btnsParams.subscribeBtnParams.wlcElement"
            [inlineParams]="$params.btnsParams.subscribeBtnParams"
            [disabled]="isDisableButtons"
            (click)="clickHandleHof(join)">
    </button>
</ng-template>

<ng-template #takeBtn>
    <button *ngIf="isShowTakeBtn"
            wlc-button
            [attr.data-wlc-element]="$params.btnsParams.takeBtnParams.wlcElement"
            [inlineParams]="$params.btnsParams.takeBtnParams"
            [disabled]="isDisableButtons"
            (click)="clickHandleHof(getInventory)">
    </button>
</ng-template>

<ng-template #unsubscribeBtn>
    <button *ngIf="isShowUnsubscribeBtn"
            wlc-button
            [attr.data-wlc-element]="$params.btnsParams.unsubscribeBtnParams.wlcElement"
            [inlineParams]="$params.btnsParams.unsubscribeBtnParams"
            [disabled]="isDisableButtons"
            (click)="clickHandleHof(unsubscribe)">
    </button>
</ng-template>

<ng-template #leaveBtn>
    <button *ngIf="bonus.canLeave"
            wlc-button
            [attr.data-wlc-element]="$params.btnsParams.cancelBtnParams.wlcElement"
            [inlineParams]="$params.btnsParams.cancelBtnParams"
            [disabled]="isDisableButtons"
            (click)="clickHandleHof(leave)">
    </button>
</ng-template>

<ng-template #readMoreBtn>
    <button wlc-button
            [attr.data-wlc-element]="$params.btnsParams.readMoreBtnParams.wlcElement"
            [inlineParams]="$params.btnsParams.readMoreBtnParams"
            [disabled]="isDisableButtons"
            (click)="clickHandleHof(readMoreClick, $event)">
    </button>
</ng-template>

<ng-template #closeBtn>
    <button *ngIf="isShowCloseBtn"
            wlc-button
            [attr.data-wlc-element]="$params.btnsParams.closeBtnParams.wlcElement"
            [inlineParams]="$params.btnsParams.closeBtnParams"
            [disabled]="isDisableButtons"
            (click)="clickHandleHof(action, 'close')">
    </button>
</ng-template>

<ng-template #chooseBonusBtn>
    <button *ngIf="isChooseBtn"
            wlc-button
            [attr.data-wlc-element]="$params.btnsParams.chooseBtnParams.wlcElement"
            [inlineParams]="$params.btnsParams.chooseBtnParams"
            [disabled]="bonus.isChoose || isDisableButtons"
            (click)="clickHandleHof(chooseBonus)">
    </button>
</ng-template>

<ng-template #actionDepositBtn>
    <button *ngIf="isShowDepositBtn"
            wlc-button
            [attr.data-wlc-element]="$params.btnsParams.depositBtnParams.wlcElement"
            [inlineParams]="$params.btnsParams.depositBtnParams"
            [disabled]="isDisableButtons"
            (click)="clickHandleHof(action, 'deposit')">
    </button>
</ng-template>

<ng-template #actionPlayBtn>
    <button *ngIf="isShowPlayBtn"
            wlc-button
            [attr.data-wlc-element]="$params.btnsParams.playBtnParams.wlcElement"
            [inlineParams]="$params.btnsParams.playBtnParams"
            [disabled]="isDisableButtons"
            (click)="clickHandleHof(action, 'play')">
    </button>
</ng-template>

<ng-template #actionRegisterBtn>
    <button *ngIf="!isAuth"
            wlc-button
            [attr.data-wlc-element]="$params.btnsParams.registerBtnParams.wlcElement"
            [inlineParams]="$params.btnsParams.registerBtnParams"
            [disabled]="isDisableButtons"
            (click)="clickHandleHof(action, 'register')">
    </button>
</ng-template>

<ng-template #registrationBtn>
    <button *ngIf="!isAuth"
            wlc-button
            [attr.data-wlc-element]="$params.btnsParams.registerBtnParams.wlcElement"
            [inlineParams]="$params.btnsParams.registerBtnParams"
            [disabled]="isDisableButtons"
            (click)="clickHandleHof(registration)">
    </button>
</ng-template>

<ng-template #openLootboxBtn>
    <button *ngIf="isShowOpenBtn"
            wlc-button
            [attr.data-wlc-element]="$params.btnsParams.openBtnParams.wlcElement"
            [inlineParams]="$params.btnsParams.openBtnParams"
            [disabled]="isDisableButtons"
            (click)="clickHandleHof(action, 'openLootbox')">
    </button>
</ng-template>

<ng-template #cancelModal>
    <div wlc-bonus-confirmation
         [loyaltyBonusId]="bonus.LBID"
         [bonusId]="bonus.id"
         [confirmationAction]="'cancel'">
    </div>
</ng-template>

<ng-template #subscribeModal>
    <div wlc-bonus-confirmation
         [loyaltyBonusId]="bonus.LBID"
         [bonusId]="bonus.id"
         [confirmationAction]="'subscribe'">
    </div>
</ng-template>
