<ng-container *ngIf="isReady && bonuses?.length && slides?.length; else: noBonuses">
    <div wlc-scrollbar
         class="{{$class}}__bonus-wrp">
        <div *ngIf="!landscapeOrientation || !isMobile"
             wlc-wrapper
             class="{{$class}}__slider"
             [inlineParams]="defaultSliderConfig">
        </div>
        <div *ngIf="isMobile && landscapeOrientation"
             class="{{$class}}__slider"
             wlc-wrapper
             [inlineParams]="landscapeSliderConfig">
        </div>
        <div *ngIf="isDesktopAndSlidesLength" slot-container-end>
            <button wlc-icon
                class="wlc-game-dashboard-bonuses-nav swiper-button-prev wlc-swiper-button-prev"
                iconPath="/wlc/icons/arrow.svg">
            </button>
            <button wlc-icon
                class="wlc-game-dashboard-bonuses-nav swiper-button-next wlc-swiper-button-next"
                iconPath="/wlc/icons/arrow.svg">
            </button>
        </div>
    </div>
</ng-container>

<ng-template #noBonuses>
    <div *ngIf="isReady" class="{{$class}}__not-found" >{{'No bonuses available' | translate}}</div>
    <div *ngIf="!isReady" class="{{$class}}__not-found">
        <div wlc-loader></div>
    </div>
</ng-template>
