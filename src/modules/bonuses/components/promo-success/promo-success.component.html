<div class="{{$class}}__container">
    <h4 class="{{$class}}__title">{{$params.common.title | translate}}</h4>

    <span wlc-icon
          class="{{$class}}__icon"
          [iconPath]="$params.common.iconPath"
    >
    </span>

    <div class="{{$class}}__text">{{$params.common.text | translate}}</div>

    <button
        wlc-button
        class="{{$class}}__btn"
        [text]="$params.common.btnText"
        (click)="goTo('app.profile.loyalty-bonuses.main')"
    ></button>
</div>
