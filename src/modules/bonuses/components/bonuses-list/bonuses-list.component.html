<ng-template #default>
    <div class="{{$class}}__content" data-wlc-element="block_bonuses-main">
        <div *ngIf="$params.type !== 'swiper'" class="{{$class}}__list-wrapper">
            <div *ngIf="paginatedBonuses?.length && isReady; else: noBonuses"
                 class="{{$class}}__list"
                 data-wlc-element="block_bonus">
                <div *ngFor="let bonus of paginatedBonuses"
                     wlc-bonus-item
                     [inlineParams]="calcBonusItemParams(bonus)">
                </div>
            </div>
            <div *ngIf="paginatedBonuses?.length"
                 wlc-pagination
                 [items]="bonuses"
                 [settings]="$params.common?.pagination"
                 (paginationOnChange)="paginationOnChange($event)">
            </div>
        </div>
        <div *ngIf="$params.type === 'swiper'" class="{{$class}}__list-wrapper">
            <ng-container *ngIf="bonuses?.length && isReady; else: noBonuses">
                <div wlc-slider
                     class="{{$class}}__slider"
                     type="dashboard"
                     [slides]="slides"
                     [inlineParams]="sliderParams">
                </div>

                <div *ngIf="showNavigation" slot-container-end>
                    <button wlc-icon
                            class="wlc-swiper-button-prev swiper-button-prev"
                            iconPath="/wlc/icons/arrow.svg"></button>
                    <button wlc-icon
                            class="wlc-swiper-button-next swiper-button-next"
                            iconPath="/wlc/icons/arrow.svg"></button>
                </div>
            </ng-container>
        </div>
    </div>
</ng-template>

<ng-template #noBonuses>
    <ng-container *ngIf="isReady; then noContentNative; else loader"></ng-container>
</ng-template>

<ng-template #promoHome>
    <ng-container *ngIf="bonuses?.length; else: noContent">
        <div wlc-slider
             class="{{$class}}__slider"
             type="dashboard"
             [slides]="slides"
             [inlineParams]="sliderParams"
        ></div>
    </ng-container>

    <div *ngIf="showNavigation" slot-container-end>
        <div class="{{$class}}__slider-pagination">
            <button wlc-icon
                    class="wlc-swiper-button-prev"
                    iconPath="/wlc/icons/arrow.svg"></button>
            <button wlc-icon
                    class="wlc-swiper-button-next"
                    iconPath="/wlc/icons/arrow.svg"></button>
        </div>
    </div>
</ng-template>

<ng-template #partial>
    <div class="{{$class}}__content" data-wlc-element="block_bonuses-main">
        <div *ngIf="$params.type !== 'swiper'" class="{{$class}}__list-wrapper">
            <div *ngIf="bonuses?.length && isReady; else: noBonuses"
                 class="{{$class}}__list"
                 data-wlc-element="block_bonus">
                <div *ngFor="let bonus of bonuses"
                     wlc-bonus-item
                     [inlineParams]="calcBonusItemParams(bonus)">
                </div>
            </div>
        </div>
        <div *ngIf="$params.type === 'swiper'" class="{{$class}}__list-wrapper">
            <ng-container *ngIf="bonuses?.length && isReady; else: noBonuses">
                <div wlc-slider
                     class="{{$class}}__slider"
                     [slides]="slides"
                     [inlineParams]="sliderParams"
                     (slideChangeTransitionEnd$)="onSlideChange($event)">
                    <div *ngIf="showNavigation" slot-container-end>
                        <div class="container swiper-button-container">
                            <button wlc-icon
                                    class="wlc-swiper-button-prev"
                                    iconPath="/wlc/icons/arrow.svg"></button>
                            <button wlc-icon
                                    class="wlc-swiper-button-next"
                                    iconPath="/wlc/icons/arrow.svg"></button>
                        </div>
                    </div>
                </div>
            </ng-container>
        </div>
        <div *ngIf="$params.theme === 'reg-first' && bonuses?.length" class="{{$class}}__checkbox-wrapper">
            <div wlc-checkbox
                 class="{{$class}}__checkbox"
                 [inlineParams]="checkBoxParams"></div>
        </div>
    </div>
</ng-template>

<!-- TODO Change to ng-template and *ngIf ... else -->
<ng-template #promo>
    <div class="{{$class}}__content" data-wlc-element="block_bonuses-main">
        <div *ngIf="$params.type !== 'swiper'" class="{{$class}}__list-wrapper">
            <div *ngIf="bonuses?.length && isReady; else: noBonuses"
                 class="{{$class}}__list"
                 data-wlc-element="block_bonus">
                <div *ngFor="let bonus of bonuses"
                     wlc-bonus-item
                     [inlineParams]="calcBonusItemParams(bonus)">
                </div>
            </div>
        </div>
        <div *ngIf="$params.type === 'swiper'" class="{{$class}}__list-wrapper">
            <ng-container *ngIf="bonuses?.length && isReady; else: noBonuses">
                <div wlc-slider
                     class="{{$class}}__slider"
                     type="dashboard"
                     [slides]="slides"
                     [inlineParams]="sliderParams">
                </div>

                <div *ngIf="showNavigation" slot-container-end>
                    <button wlc-icon
                            class="wlc-swiper-button-prev swiper-button-prev"
                            iconPath="/wlc/icons/arrow.svg"></button>
                    <button wlc-icon
                            class="wlc-swiper-button-next swiper-button-next"
                            iconPath="/wlc/icons/arrow.svg"></button>
                </div>
            </ng-container>
        </div>
    </div>
    <button *ngIf="isAuthAndBonusesLength && $params.redirectBtnToProfile?.use"
            wlc-button
            class="{{$class}}__to-profile"
            [inlineParams]="$params.redirectBtnToProfile.params">
    </button>
</ng-template>

<ng-template #noContent>
    <div class="{{$class}}-nocontent__tag">{{'Bonuses' | translate}}</div>
    <div wlc-no-content
        [inlineParams]="noContentParams"
        [loading]="!isReady">
    </div>
</ng-template>

<ng-template #noContentNative>
    <ng-container [ngSwitch]="$params.theme">

        <ng-container *ngSwitchCase="'reg-first'">
            <div wlc-bonus-item [inlineParams]="calcBonusItemParams()"></div>
            <div class="{{$class}}__checkbox-wrapper">
                <div wlc-checkbox
                    class="{{$class}}__checkbox"
                    [inlineParams]="checkBoxParams"></div>
            </div>
        </ng-container>
        <ng-container *ngSwitchCase="'partial'">
            <div wlc-bonus-item [inlineParams]="calcBonusItemParams(blankBonus)"></div>
        </ng-container>

        <ng-container *ngSwitchDefault>
            <div *ngIf="$params.common.useNoDataText"
                class="{{$class}}__nocontent-text">
                {{ 'You don\'t have an active bonus. Choose from the recommended bonuses or go to the' | translate}}
                <a class="{{$class}}__nocontent-link"
                    [uiSref]="'app.profile.loyalty-bonuses.main'">
                    {{'Offers' | translate}}</a>.
            </div>
            <div *ngIf="!$params.common.useNoDataText"
                class="{{$class}}__nocontent">
                {{ 'No bonuses available' | translate}}
                <button *ngIf="$params.btnNoBonuses?.use"
                        wlc-button
                        class="{{$class}}__nocontent-btn"
                        [inlineParams]="$params.btnNoBonuses.params">
                </button>
            </div>
        </ng-container>

    </ng-container>
</ng-template>

<ng-template #loader>
    <div class="{{$class}}__nocontent">
        <div wlc-loader></div>
    </div>
</ng-template>

<ng-container [ngSwitch]="$params.theme">
    <ng-container *ngSwitchCase="'partial'" [ngTemplateOutlet]="partial"></ng-container>
    <ng-container *ngSwitchCase="'reg-first'" [ngTemplateOutlet]="partial"></ng-container>
    <ng-container *ngSwitchCase="'promo-home'" [ngTemplateOutlet]="promoHome"></ng-container>
    <ng-container *ngSwitchCase="'promo'" [ngTemplateOutlet]="promo"></ng-container>
    <ng-container *ngSwitchDefault [ngTemplateOutlet]="default"></ng-container>
</ng-container>
