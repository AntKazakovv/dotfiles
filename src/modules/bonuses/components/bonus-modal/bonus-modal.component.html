<ng-container [ngSwitch]="$params.theme">
    <ng-container *ngSwitchCase="'wolf'" [ngTemplateOutlet]="themeWolf"></ng-container>
    <ng-container *ngSwitchDefault [ngTemplateOutlet]="themeDefault"></ng-container>
</ng-container>

<ng-template #themeDefault>
    <div class="{{$class}}__wrapper">
        <div class="{{$class}}__info-wrapper">
            <div class="{{$class}}__image-block">
                <div class="{{$class}}__image"
                     data-wlc-element="bonus_image"
                     [style.backgroundImage]="bonusBgUrl"
                ></div>
                <div wlc-bonus-item [inlineParams]="{bonus, theme: 'modal'}"></div>
            </div>
            <div class="{{$class}}__info-block">
                <ng-container [ngTemplateOutlet]="alerts"></ng-container>
                <h4 class="{{$class}}__name" data-wlc-element="bonus_title-name">{{bonus.name}}</h4>
                <ng-container [ngTemplateOutlet]="buttons"></ng-container>
                <ng-container [ngTemplateOutlet]="active"></ng-container>
                <div *ngIf="bonus.description || bonus.terms" class="{{$class}}__desc-block">
                    <ng-container [ngTemplateOutlet]="descr"></ng-container>
                    <ng-container [ngTemplateOutlet]="terms"></ng-container>
                </div>
                <ng-container [ngTemplateOutlet]="games"></ng-container>
                <ng-container *ngIf="bonus.isLootbox" [ngTemplateOutlet]="rewards"></ng-container>
            </div>
        </div>
    </div>
</ng-template>

<ng-template #themeWolf>
    <div class="{{$class}}__top"
        data-wlc-element="bonus_image"
        [style.backgroundImage]="bonusBgUrl"></div>
    <div class="{{$class}}__content">
        <h4 class="{{$class}}__name" data-wlc-element="bonus_title-name">{{bonus.name}}</h4>
        <ng-container [ngTemplateOutlet]="alerts"></ng-container>
        <ng-container [ngTemplateOutlet]="active"></ng-container>
        <ng-container [ngTemplateOutlet]="descr"></ng-container>
        <ng-container [ngTemplateOutlet]="terms"></ng-container>
        <ng-container [ngTemplateOutlet]="games"></ng-container>
        <ng-container *ngIf="bonus.isLootbox" [ngTemplateOutlet]="rewards"></ng-container>
        <ng-container [ngTemplateOutlet]="buttons"></ng-container>
    </div>
</ng-template>

<ng-template #games>
    <div *ngIf="showGames" class="{{$class}}__games">
        <ng-container *ngIf="!isLoadingGames; else loader">
            <div wlc-accordion
                [inlineParams]="gamesAccordion"
                [expand$]="expandGames$"></div>
        </ng-container>
    </div>
</ng-template>

<ng-template #active>
    <div *ngIf="showActiveBlock" class="{{$class}}__active">
        <div class="{{$class}}__timer">
            <div *ngIf="showExpirationTimer"
                wlc-timer
                text="{{'Time remaining' | translate}}"
                [value]="bonus.expirationTimeDaysjs"
                [serverDateUTC]="bonus.serverTime">
            </div>
            <div *ngIf="showSubscribeTimer"
                wlc-timer
                text="{{'Available for activation' | translate}}"
                [value]="bonus.timerEnd"
                [serverDateUTC]="bonus.serverTime">
            </div>
        </div>

        <div *ngIf="bonus.wageringTotal" class="{{$class}}__progress">
            <div wlc-bonus-wager
                [inlineParams]="wagerParams"
                [bonus]="bonus">
            </div>
        </div>
    </div>
</ng-template>

<ng-template #descr>
    <div *ngIf="bonus.description"
        class="{{$class}}__description"
        data-wlc-element="bonus_description-name">
        <div wlc-dynamic-html
            [html]="bonus.description"
            [parseAsPlainHTML]="true">
        </div>
    </div>
</ng-template>

<ng-template #terms>
    <div *ngIf="bonus.terms"
        class="{{$class}}__terms"
        data-wlc-element="bonus_terms-name">
        <div wlc-dynamic-html
            [html]="bonus.terms"
            [parseAsPlainHTML]="true">
        </div>
    </div>
</ng-template>

<ng-template #buttons>
    <div *ngIf="!$params.hideBonusButtons" class="{{$class}}__btns">
        <div wlc-bonus-buttons
            [inlineParams]="{
                theme: 'modal',
                isInsideModal: true,
            }"
            [bonus]="bonus"
            [bonusItemTheme]="'modal'"
            (showGames)="expandGames()">
        </div>
    </div>
</ng-template>

<ng-template #loader>
    <div wlc-loader></div>
</ng-template>

<ng-template #rewards>
    <div *ngIf="!isRewardsLoading; else loader" class="{{$class}}__possible-rewards">
        <div wlc-accordion
            class="{{$class}}__possible-rewards"
            [inlineParams]="bonusRewards"></div>
    </div>
</ng-template>

<ng-template #alerts>
    <div *ngIf="showAlerts" class="{{$class}}__alerts">
        <div *ngFor="let alert of $params.alerts"
            wlc-alert
            [title]="alert.title | translate"
            [text]="alert.text | translate"
            [level]="alert.level"></div>
    </div>
</ng-template>
