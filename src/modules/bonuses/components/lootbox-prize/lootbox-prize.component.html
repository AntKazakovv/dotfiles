<ng-container [ngSwitch]="$params.theme">
    <ng-container *ngSwitchCase="'wolf'" [ngTemplateOutlet]="wolf"></ng-container>
    <ng-container *ngSwitchDefault [ngTemplateOutlet]="default"></ng-container>
</ng-container>

<ng-template #wolf>
    <div class="{{$class}}__image-wrapper"
        [style]="{backgroundImage: 'url(' + imagePromo + ')'}">
    </div>
    <ng-container [ngTemplateOutlet]="name"></ng-container>
</ng-template>

<ng-template #default>
    <div *ngIf="bgImage || isProfileFirst"
        class="{{$class}}__image-wrapper">
        <img *ngIf="bgImage"
            class="{{$class}}__image"
            [src]="bgImage">

        <div *ngIf="!isProfileFirst && bgImage"
            class="{{$class}}__shadow">
        </div>
    </div>

    <div *ngIf="!isProfileFirst"
        class="{{$class}}__icon">
        <img class="{{$class}}__icon-sign"
            draggable="false"
            alt="bonus icon"
            [src]="iconPath">
    </div>

    <ng-container [ngTemplateOutlet]="name"></ng-container>
</ng-template>

<ng-template #name>
    <h4 class="{{$class}}__name"
        data-wlc-element="lootbox-prize_name">
        {{prizeName}}
    </h4>
</ng-template>
