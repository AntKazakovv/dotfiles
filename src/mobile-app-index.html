<!doctype html>
<html>
<head>
    <meta charset="utf-8">
    <title>{{title}}</title>
    <base href="/">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="/static/css/mobile-app.loader.css">
    <link rel="stylesheet" href="/static/css/mobile-app.forbidden.css">
    <link rel="stylesheet" href="/static/css/mobile-app.offline.css">
    <script>
        (function initApp() {
            if (window !== window.top || window !== window.parent || document !== window.top.document) {
                window.parent.postMessage(JSON.stringify({event: 'WLC_LOAD_STARTED'}), '*');
            }

            window.WLC_VERSION = '';
            if (location.search) {
                var matches = location.search.match(/redirectTo=(.*)/);

                if (matches && matches[1]) {
                    window.history.replaceState(null, null, matches[1]);
                    return;
                }
            }

            window.language = window.localStorage.getItem('ngx-webstorage|currentlanguage')?.replace(/"/g, '') || '{{lang}}';
            window.history.replaceState(null, null, '/' + window.language);
        })();
    </script>
    {% include "head.html" %}
</head>
<body>

<div ui-view class="wlc-app" id="app">
    {% include "preloader.html" %}
    {% include "footer.html" %}
</div>

<div class="wlc-app" id="app-offline" style="display: none">
    {% include "offline.html" %}
</div>

<div class="wlc-app" id="app-forbidden" style="display: none">
    {% include "forbidden.html" %}
</div>

{% include "translations.html" %}

<script>
    if (!window.navigator.onLine) {
        document.querySelector('#app').style.display = 'none';
        document.querySelector('#app-offline').style.display = 'block';

        window.addEventListener('online', () => {
            window.location.replace(window.location.origin + '/index.html');
        });
    }
</script>

<noscript>Please enable JavaScript to continue using this application.</noscript>
<script src="cordova.js"></script>
<script src="static/inline.js" preload></script>

</body>
</html>
